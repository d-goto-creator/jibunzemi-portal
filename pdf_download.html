<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜PDFワークシート</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5;
    --accent: #F8D423;
    --accent-press: #E8C40F;
    --navy: #1A3A6B;
    --ink: #1F1F1F;
    --white: #FFFFFF;
    --muted: #6B6B70;
    --line: #E4E4E7;
    --field: #FAFAFA;
    --radius: 12px;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --ok: #1F8A5B;
    --pdf: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { min-height: 100%; }
  a { color: inherit; }

  /* ── Nav ── */
  .nav { height: 60px; background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 30; }
  .nav .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .brand-mark span { font-weight: 900; font-size: 16px; color: var(--navy); line-height: 1; }
  .nav .brand-name { color: var(--white); font-weight: 700; font-size: 17px; letter-spacing: 0.04em; }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .nav-link { color: rgba(255,255,255,0.82); font-size: 13px; font-weight: 700; text-decoration: none; padding: 8px 13px; border-radius: 8px; display: flex; align-items: center; gap: 7px; transition: color 0.15s, background 0.15s; cursor: pointer; background: none; border: none; font-family: inherit; }
  .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.10); }
  .nav-link.active { color: var(--white); background: rgba(255,255,255,0.13); }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 13px; margin-left: 4px; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 24px 64px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
  .page-head h1 { font-size: 26px; font-weight: 900; letter-spacing: 0.02em; display: flex; align-items: center; gap: 12px; }
  .page-head h1 .hic { width: 38px; height: 38px; border-radius: 10px; background: rgba(192,57,43,0.10); color: var(--pdf); display: grid; place-items: center; }
  .page-head p { font-size: 13.5px; color: var(--muted); margin-top: 6px; }
  .gdrive-note { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; background: var(--white); border: 1.5px solid var(--line); padding: 8px 14px; border-radius: 99px; white-space: nowrap; }

  .subhead { font-size: 13px; color: var(--muted); margin: 18px 0 16px; }
  .subhead b { color: var(--ink); font-weight: 700; }

  /* ── Filter ── */
  .filters { display: flex; gap: 9px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 22px; scrollbar-width: thin; }
  .filters::-webkit-scrollbar { height: 6px; }
  .filters::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
  .filter-btn { flex-shrink: 0; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--muted); background: var(--white); border: 1.5px solid var(--line); border-radius: 99px; padding: 9px 18px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; transition: all 0.16s; }
  .filter-btn:hover { border-color: var(--muted); color: var(--ink); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--ink); box-shadow: 0 2px 8px rgba(248,212,35,0.4); }
  .filter-btn .fc { font-size: 11px; font-weight: 900; background: var(--bg); color: var(--muted); padding: 1px 7px; border-radius: 99px; min-width: 20px; text-align: center; }
  .filter-btn.active .fc { background: rgba(0,0,0,0.12); color: var(--ink); }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .pdf-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 20px 18px; display: flex; flex-direction: column; transition: transform 0.12s, box-shadow 0.18s; border: 1.5px solid transparent; position: relative; }
  .pdf-card:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,0,0,0.13); border-color: rgba(248,212,35,0.5); }
  .pdf-card.got { border-color: var(--line); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .pdf-icon { width: 48px; height: 58px; border-radius: 9px; flex-shrink: 0; background: rgba(192,57,43,0.09); color: var(--pdf); border: 1.5px solid rgba(192,57,43,0.2); display: grid; place-items: center; position: relative; }
  .pdf-icon .ext { position: absolute; bottom: 6px; font-size: 8px; font-weight: 900; letter-spacing: 0.04em; }
  .got-badge { font-size: 10.5px; font-weight: 900; padding: 4px 10px; border-radius: 99px; display: inline-flex; align-items: center; gap: 4px; background: rgba(138,138,144,0.16); color: #7a7a80; }
  .cat-mini { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; margin-bottom: 9px; align-self: flex-start; }
  .pdf-card h3 { font-size: 15px; font-weight: 700; line-height: 1.45; margin-bottom: 8px; text-wrap: pretty; }
  .linked { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .linked .li { color: var(--navy); flex-shrink: 0; }
  .linked .lt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pdf-desc { font-size: 12.5px; color: #4a4a50; line-height: 1.6; margin-bottom: 14px; flex: 1; }
  .pdf-meta { font-size: 11px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .pdf-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--line); }

  .btn-dl { width: 100%; font-family: inherit; font-size: 14px; font-weight: 900; color: var(--ink); background: var(--accent); border: none; border-radius: 10px; padding: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 3px 10px rgba(248,212,35,0.35); transition: all 0.16s; position: relative; overflow: hidden; }
  .btn-dl:hover { background: var(--accent-press); box-shadow: 0 5px 14px rgba(248,212,35,0.45); }
  .btn-dl:active { transform: translateY(1px); }
  .btn-dl:disabled { background: var(--field); color: var(--muted); box-shadow: none; cursor: default; }
  .btn-dl.got-btn { background: var(--white); color: var(--ok); border: 1.5px solid rgba(31,138,91,0.4); box-shadow: none; }
  .btn-dl.got-btn:hover { background: rgba(31,138,91,0.06); }
  .spinner { width: 15px; height: 15px; border: 2.5px solid rgba(31,31,31,0.2); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category color palette */
  .cc-0 { background: rgba(248,212,35,0.22); color: #8a7000; }
  .cc-1 { background: rgba(26,58,107,0.10);  color: var(--navy); }
  .cc-2 { background: rgba(107,70,193,0.12); color: #5a37b0; }
  .cc-3 { background: rgba(31,138,91,0.12);  color: var(--ok); }
  .cc-4 { background: rgba(176,84,43,0.12);  color: #9c4a25; }
  .cc-5 { background: rgba(220,53,69,0.10);  color: #b02a37; }
  .cc-6 { background: rgba(13,202,240,0.12); color: #0a7280; }
  .cc-7 { background: rgba(102,16,242,0.10); color: #5b0fa8; }

  /* skeleton */
  .skeleton { background: linear-gradient(90deg, var(--line) 25%, #f0f0f2 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .e-icon { color: var(--line); margin-bottom: 14px; }
  .empty h3 { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }

  .foot { margin-top: 36px; font-size: 11px; color: #A0A0A6; text-align: center; letter-spacing: 0.02em; }

  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); background: var(--navy); color: var(--white); font-size: 13px; font-weight: 500; padding: 13px 22px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.22); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 50; display: flex; align-items: center; gap: 9px; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .tk { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }

  @media (max-width: 880px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 620px) {
    .nav { padding: 0 16px; }
    .nav-right .nav-link span.txt { display: none; }
    .nav-link { padding: 8px; }
    .wrap { padding: 22px 16px 52px; }
    .page-head h1 { font-size: 21px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ── GAS API エンドポイント ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

function App() {
  const [user] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jz_user') || '{}'); } catch { return {}; }
  });

  const [pdfs,       setPdfs]       = useState([]);
  const [categories, setCategories] = useState([]);
  const [articles,   setArticles]   = useState([]);
  const [gotSet,     setGotSet]     = useState(new Set()); // Set of pdf IDs already downloaded
  const [loading,    setLoading]    = useState(true);
  const [dlState,    setDlState]    = useState({}); // pdfId -> 'loading' | 'done'
  const [toast,      setToast]      = useState('');
  const [activeCat,  setActiveCat]  = useState('all');

  /* ── 認証チェック & データ取得 ── */
  useEffect(() => {
    const token = localStorage.getItem('jz_token');
    if (!token) { window.location.href = 'login.html'; return; }

    (async () => {
      try {
        const [pData, cData, aData, lData] = await Promise.all([
          gasPost({ action: 'getPdfs',            token }),
          gasPost({ action: 'getCategories',      token }),
          gasPost({ action: 'getArticles',        token }),
          gasPost({ action: 'getPdfDownloadLogs', token }),
        ]);

        if (pData.success === false && /認証|token|auth/i.test(pData.error || '')) {
          localStorage.removeItem('jz_token');
          localStorage.removeItem('jz_user');
          window.location.href = 'login.html';
          return;
        }

        if (pData.success) setPdfs(pData.pdfs || []);
        if (cData.success) setCategories(cData.categories || []);
        if (aData.success) setArticles(aData.articles || []);

        // ダウンロード済みPDF IDのセット
        if (lData.success) {
          const logs = lData.logs || lData.pdfs || [];
          setGotSet(new Set(logs.map(l => String(l.pdf_id || l.id))));
        }
      } catch (e) {
        console.error('fetch error', e);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  /* ── ログアウト ── */
  async function handleLogout() {
    const token = localStorage.getItem('jz_token');
    try { await gasPost({ action: 'logout', token }); } catch {}
    localStorage.removeItem('jz_token');
    localStorage.removeItem('jz_user');
    window.location.href = 'login.html';
  }

  /* ── トースト ── */
  function flash(msg) {
    setToast(msg);
    clearTimeout(window._jzt);
    window._jzt = setTimeout(() => setToast(''), 2400);
  }

  /* ── 派生データ ── */
  const catById = useMemo(() => {
    const m = {};
    categories.forEach((c, i) => { m[String(c.id)] = { ...c, idx: i % 8 }; });
    return m;
  }, [categories]);

  const artById = useMemo(() => {
    const m = {};
    articles.forEach(a => { m[String(a.id)] = a; });
    return m;
  }, [articles]);

  // フィルタ用カウント
  const counts = useMemo(() => {
    const c = { all: pdfs.length };
    pdfs.forEach(p => {
      const key = String(p.category_id || p.category || '');
      c[key] = (c[key] || 0) + 1;
    });
    return c;
  }, [pdfs]);

  const gotCount = useMemo(() =>
    pdfs.filter(p => gotSet.has(String(p.id))).length,
  [pdfs, gotSet]);

  // フィルタ後リスト
  const filtered = useMemo(() => {
    if (activeCat === 'all') return pdfs;
    return pdfs.filter(p => String(p.category_id || p.category || '') === activeCat);
  }, [pdfs, activeCat]);

  /* ── ダウンロード処理 ── */
  async function handleDownload(pdf) {
    const pdfId = String(pdf.id);
    if (dlState[pdfId] === 'loading') return;

    const token = localStorage.getItem('jz_token');
    setDlState(s => ({ ...s, [pdfId]: 'loading' }));

    try {
      const res = await gasPost({ action: 'downloadPdf', token, pdfId: pdf.id });

      if (res.success === false && /認証|token|auth/i.test(res.error || '')) {
        localStorage.removeItem('jz_token');
        localStorage.removeItem('jz_user');
        window.location.href = 'login.html';
        return;
      }

      const url = res.url || res.file_url || pdf.url || pdf.file_url;
      if (url) {
        window.open(url, '_blank');
        setGotSet(prev => new Set([...prev, pdfId]));
        flash('「' + (pdf.title || pdf.name) + '」をダウンロードしました');
      } else {
        flash('ダウンロードURLが取得できませんでした');
      }
    } catch (e) {
      console.error('download error', e);
      // フォールバック: PDF自体にURLがあれば直接開く
      const fallbackUrl = pdf.url || pdf.file_url;
      if (fallbackUrl) {
        window.open(fallbackUrl, '_blank');
        setGotSet(prev => new Set([...prev, pdfId]));
        flash('「' + (pdf.title || pdf.name) + '」をダウンロードしました');
      } else {
        flash('エラーが発生しました。しばらくしてから再試行してください。');
      }
    } finally {
      setDlState(s => { const n = { ...s }; delete n[pdfId]; return n; });
    }
  }

  const avatarChar = (user.name || 'U').charAt(0);

  return (
    <React.Fragment>
      {/* ── ナビゲーション ── */}
      <nav className="nav">
        <div className="brand">
          <div className="brand-mark"><span>ジ</span></div>
          <div className="brand-name">ジブンゼミ</div>
        </div>
        <div className="nav-right">
          <a className="nav-link" href="home.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span className="txt">ホーム</span>
          </a>
          <a className="nav-link" href="articles.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span className="txt">記事一覧</span>
          </a>
          <a className="nav-link active" href="pdf_download.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span className="txt">PDF</span>
          </a>
          <a className="nav-link" href="mypage.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span className="txt">マイページ</span>
          </a>
          <button className="nav-link" style={{color:'rgba(255,255,255,0.7)'}} onClick={handleLogout}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span className="txt">ログアウト</span>
          </button>
          <div className="nav-avatar">{avatarChar}</div>
        </div>
      </nav>

      <div className="wrap">
        <div className="page-head">
          <div>
            <h1>
              <span className="hic">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </span>
              PDFワークシート一覧
            </h1>
            <p>記事と連動したワークシートをダウンロードして、手を動かしながら学べます。</p>
          </div>
          <div className="gdrive-note">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
            会員限定・Googleドライブ管理
          </div>
        </div>

        {/* カウント */}
        <div className="subhead">
          {loading
            ? '読み込み中…'
            : <React.Fragment>全 <b>{pdfs.length}</b> 件　うち取得済み <b>{gotCount}</b> 件</React.Fragment>
          }
        </div>

        {/* フィルタ */}
        <div className="filters">
          <button
            className={"filter-btn" + (activeCat === 'all' ? ' active' : '')}
            onClick={() => setActiveCat('all')}
          >
            すべて<span className="fc">{counts.all || 0}</span>
          </button>
          {categories.map(cat => (
            <button
              key={cat.id}
              className={"filter-btn" + (activeCat === String(cat.id) ? ' active' : '')}
              onClick={() => setActiveCat(String(cat.id))}
            >
              {cat.name}<span className="fc">{counts[String(cat.id)] || 0}</span>
            </button>
          ))}
        </div>

        {/* グリッド */}
        <div className="grid">
          {loading ? (
            // スケルトン 6枚
            [0,1,2,3,4,5].map(i => (
              <div className="skeleton" key={i} style={{height: 280}}></div>
            ))
          ) : filtered.length === 0 ? (
            <div className="empty">
              <div className="e-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </div>
              <h3>このカテゴリのワークシートはありません</h3>
            </div>
          ) : filtered.map(p => {
            const pdfId    = String(p.id);
            const isGot    = gotSet.has(pdfId);
            const isDling  = dlState[pdfId] === 'loading';
            const cat      = catById[String(p.category_id || p.category || '')];
            const catName  = cat?.name || '';
            const catIdx   = cat?.idx ?? 0;
            // 連動記事
            const linkedArt = p.article_id ? artById[String(p.article_id)] : null;
            const linkedTitle = linkedArt?.title || p.article_title || '';
            const title = p.title || p.name || 'ワークシート';
            const desc  = p.description || p.desc || '';
            const pages = p.pages || p.page_count || '';
            const size  = p.file_size || p.size || '';

            return (
              <div className={"pdf-card" + (isGot ? " got" : "")} key={pdfId}>
                <div className="card-top">
                  <div className="pdf-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span className="ext">PDF</span>
                  </div>
                  {isGot && (
                    <span className="got-badge">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      取得済み
                    </span>
                  )}
                </div>

                {catName && <span className={"cat-mini cc-" + catIdx}>{catName}</span>}
                <h3>{title}</h3>

                {linkedTitle && (
                  <div className="linked">
                    <span className="li">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </span>
                    <span className="lt">{linkedTitle}</span>
                  </div>
                )}

                {desc && <div className="pdf-desc">{desc}</div>}

                <div className="pdf-meta">
                  <span>PDF</span>
                  {pages && <React.Fragment><span className="dot"></span><span>A4 {pages}ページ</span></React.Fragment>}
                  {size  && <React.Fragment><span className="dot"></span><span>{size}</span></React.Fragment>}
                </div>

                <button
                  className={"btn-dl" + (isGot && !isDling ? " got-btn" : "")}
                  onClick={() => handleDownload(p)}
                  disabled={isDling}
                >
                  {isDling ? (
                    <React.Fragment>
                      <span className="spinner"></span>
                      ダウンロード中…
                    </React.Fragment>
                  ) : isGot ? (
                    <React.Fragment>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      再ダウンロード
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      ダウンロード
                    </React.Fragment>
                  )}
                </button>
              </div>
            );
          })}
        </div>

        <div className="foot">© 2026 ジブンゼミ　月額500円のキャリア支援サブスク</div>
      </div>

      {/* トースト */}
      <div className={"toast" + (toast ? " show" : "")}>
        <span className="tk">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        {toast}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
