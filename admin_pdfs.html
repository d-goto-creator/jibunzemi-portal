<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜PDF管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#F4F4F5;--accent:#F8D423;--accent-press:#E8C40F;--navy:#1A3A6B;--ink:#1F1F1F;--white:#FFFFFF;--muted:#6B6B70;--line:#E4E4E7;--field:#FAFAFA;--radius:12px;--shadow:0 4px 16px rgba(0,0,0,0.12);--ok:#1F8A5B;--danger:#C0392B;--pdf:#C0392B}
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  #root{min-height:100%}
  .shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .sidebar{background:var(--navy);color:var(--white);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:20px 22px;border-bottom:1px solid rgba(255,255,255,0.10)}
  .sb-brand .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
  .sb-brand .mark span{font-weight:900;font-size:17px;color:var(--navy)}
  .sb-brand .t .n{font-weight:700;font-size:15px;letter-spacing:0.03em}
  .sb-brand .t .s{font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:0.08em}
  .sb-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
  .sb-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.1em;padding:10px 12px 6px}
  .sb-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:9px;color:rgba(255,255,255,0.78);font-size:13.5px;font-weight:700;cursor:pointer;border:none;background:none;font-family:inherit;text-align:left;width:100%;text-decoration:none;transition:background 0.15s,color 0.15s}
  .sb-item:hover{background:rgba(255,255,255,0.08);color:var(--white)}
  .sb-item.active{background:var(--accent);color:var(--ink)}
  .sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,0.10);display:flex;flex-direction:column;gap:8px}
  .sb-user{display:flex;align-items:center;gap:11px;padding:8px 6px}
  .sb-user .av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--navy);display:grid;place-items:center;font-weight:900;font-size:14px;flex-shrink:0}
  .sb-user .u .un{font-size:13px;font-weight:700}
  .sb-user .u .ur{font-size:10.5px;color:rgba(255,255,255,0.55)}
  .sb-logout{display:flex;align-items:center;gap:9px;font-family:inherit;font-size:12.5px;font-weight:700;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:8px;width:100%;transition:all 0.15s}
  .sb-logout:hover{color:#ff8a7a;background:rgba(192,57,43,0.12)}
  .main{padding:26px 32px 48px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px}
  .topbar h1{font-size:23px;font-weight:900}
  .topbar .sub{font-size:12.5px;color:var(--muted);margin-top:4px}
  .btn-add{font-family:inherit;font-size:13.5px;font-weight:900;color:var(--ink);background:var(--accent);border:none;border-radius:10px;padding:12px 18px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 3px 10px rgba(248,212,35,0.4);transition:all 0.15s}
  .btn-add:hover{background:var(--accent-press)}
  .btn-add:disabled{background:#eee;color:#aaa;cursor:not-allowed;box-shadow:none}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
  .stat-line{font-size:12.5px;color:var(--muted)}
  .stat-line b{color:var(--ink);font-weight:700}
  .search-wrap{position:relative;width:280px}
  .search-wrap .s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search-input{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:11px 14px 11px 40px;transition:border-color 0.15s,box-shadow 0.15s}
  .search-input::placeholder{color:#B6B6BC}
  .search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(248,212,35,0.22)}
  .panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:11px;font-weight:700;color:var(--muted);text-align:left;padding:13px 18px;background:var(--field);letter-spacing:0.03em;white-space:nowrap;border-bottom:1px solid var(--line)}
  tbody td{padding:14px 18px;font-size:13px;border-top:1px solid var(--line);vertical-align:middle}
  tbody tr:hover{background:var(--field)}
  .pdf-name-cell{display:flex;align-items:center;gap:12px;min-width:200px}
  .pdf-ic{width:34px;height:40px;border-radius:6px;flex-shrink:0;background:rgba(192,57,43,0.09);color:var(--pdf);border:1.5px solid rgba(192,57,43,0.2);display:grid;place-items:center;position:relative}
  .pdf-ic .ext{position:absolute;bottom:3px;font-size:6.5px;font-weight:900}
  .pdf-name{font-weight:700;line-height:1.4}
  .linked-cell{max-width:200px;font-size:12.5px;line-height:1.45}
  .linked-cell .lc-in{display:flex;align-items:center;gap:6px}
  .linked-cell .li{color:var(--navy);flex-shrink:0}
  .linked-cell .lt{overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .linked-cell.none{color:var(--line);font-size:12px}
  .desc-cell{max-width:220px;font-size:12px;color:var(--muted);line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .gdrive-url{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--navy);text-decoration:none;display:inline-flex;align-items:center;gap:6px;max-width:150px}
  .gdrive-url:hover{text-decoration:underline}
  .gdrive-url .gt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .date-c{color:var(--muted);white-space:nowrap}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .ab{font-family:inherit;font-size:11.5px;font-weight:700;border-radius:7px;padding:7px 11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all 0.15s;border:1.5px solid var(--line);background:var(--white);white-space:nowrap}
  .ab:disabled{opacity:0.5;cursor:not-allowed}
  .ab.edit{color:var(--navy)}.ab.edit:hover{border-color:var(--navy);background:var(--field)}
  .ab.del{color:var(--danger)}.ab.del:hover{border-color:var(--danger);background:#FDF3F2}
  .empty-row td{text-align:center;color:var(--muted);padding:40px;font-size:13px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel{background:linear-gradient(90deg,#eee 25%,#f8f8f8 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:6px}
  .skel-row td{padding:16px 18px}
  .overlay{position:fixed;inset:0;background:rgba(20,30,50,0.42);opacity:0;pointer-events:none;transition:opacity 0.22s;z-index:40;display:grid;place-items:center;padding:24px}
  .overlay.show{opacity:1;pointer-events:auto}
  .modal{width:520px;max-width:100%;max-height:90vh;background:var(--bg);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,0.3);transform:translateY(16px) scale(0.98);transition:transform 0.24s cubic-bezier(.3,.7,.2,1);display:flex;flex-direction:column;overflow:hidden}
  .overlay.show .modal{transform:translateY(0) scale(1)}
  .modal-head{background:var(--white);padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-head h2{font-size:17px;font-weight:900;display:flex;align-items:center;gap:10px}
  .modal-head h2 .mi{width:30px;height:30px;border-radius:8px;background:rgba(192,57,43,0.09);color:var(--pdf);display:grid;place-items:center}
  .modal-head .closeb{border:none;background:var(--field);width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--muted);display:grid;place-items:center;transition:all 0.15s}
  .modal-head .closeb:hover{background:var(--line);color:var(--ink)}
  .modal-body{padding:22px 24px;overflow-y:auto}
  .modal-foot{background:var(--white);padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:12px}
  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  .field label{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;margin-bottom:7px}
  .req{font-size:10px;font-weight:700;color:var(--danger);background:rgba(192,57,43,0.10);padding:1px 6px;border-radius:4px}
  .field input[type=text],.field input[type=url],.field textarea,.field select{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--white);border:1.5px solid var(--line);border-radius:9px;padding:11px 13px;transition:border-color 0.15s,box-shadow 0.15s}
  .field textarea{resize:vertical;min-height:76px;line-height:1.6}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(248,212,35,0.22)}
  .field input.invalid{border-color:var(--danger);background:#FDF3F2}
  .gdrive-hint{display:flex;gap:9px;background:rgba(26,58,107,0.05);border:1.5px solid rgba(26,58,107,0.15);border-radius:9px;padding:11px 13px;margin-top:8px;font-size:11.5px;color:#3a4a66;line-height:1.55}
  .gdrive-hint .gh-ic{color:var(--navy);flex-shrink:0;margin-top:1px}
  .url-ok{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ok);font-weight:700;margin-top:7px}
  .err{font-size:11.5px;color:var(--danger);margin-top:6px;font-weight:500;display:flex;align-items:center;gap:4px}
  .btn-save{flex:1;font-family:inherit;font-size:14px;font-weight:900;color:var(--ink);background:var(--accent);border:none;border-radius:10px;padding:13px;cursor:pointer;box-shadow:0 3px 10px rgba(248,212,35,0.4);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-save:hover{background:var(--accent-press)}
  .btn-save:disabled{background:#eee;color:#aaa;cursor:not-allowed;box-shadow:none}
  .btn-cancel{font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:13px 24px;cursor:pointer;transition:all 0.15s}
  .btn-cancel:hover{background:var(--field);border-color:var(--muted)}
  .sp-spinner{width:15px;height:15px;border:2.5px solid rgba(31,31,31,0.15);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:var(--white);font-size:13px;font-weight:500;padding:13px 22px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.22);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;z-index:60;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .tk{width:18px;height:18px;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';
async function gasPost(body){const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(body)});return r.json()}
function fmtShortDate(str){if(!str)return'';const d=new Date(str);if(isNaN(d))return str;return`${d.getMonth()+1}/${d.getDate()}`}
function getInitial(n){return String(n||'A').replace(/\s+/,'').charAt(0)}
function trunc(s,n=14){return s&&s.length>n?s.slice(0,n)+'…':(s||'')}
function normalizePdf(p){return{id:p.id,name:p.name||p.title||'（無題）',drive_url:p.drive_url||p.url||'',desc:p.description||p.desc||'',article_id:p.article_id||null,created_at:p.created_at||''}}
function Icon({children,size=18}){return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>}
function PdfGlyph({size=18}){return <Icon size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Icon>}
const NAV_ITEMS=[
  {key:"dash",label:"ダッシュボード",href:"admin_dashboard.html",icon:<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>},
  {key:"users",label:"ユーザー管理",href:"admin_users.html",icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>},
  {key:"articles",label:"記事管理",href:"admin_articles.html",icon:<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>},
  {key:"pdf",label:"PDF管理",href:"admin_pdfs.html",icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>},
  {key:"cat",label:"カテゴリ管理",href:"admin_categories.html",icon:<><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>},
  {key:"stats",label:"統計",href:"admin_stats.html",icon:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>},
];
const EMPTY_FORM={name:'',drive_url:'',desc:'',article_id:''};
function App(){
  const adminToken=localStorage.getItem('jz_admin_token');
  const adminUser=(()=>{try{return JSON.parse(localStorage.getItem('jz_admin_user')||'{}')}catch{return{}}})();
  if(!adminToken){window.location.href='admin_login.html';return null}
  const [pdfs,setPdfs]=useState([]);
  const [articles,setArticles]=useState([]);
  const [loading,setLoading]=useState(true);
  const [q,setQ]=useState('');
  const [open,setOpen]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM);
  const [fErr,setFErr]=useState({});
  const [saving,setSaving]=useState(false);
  const [busy,setBusy]=useState({});
  const [toast,setToast]=useState('');
  function checkAuth(res){
    if(res.success===false&&/認証|token|auth/i.test(res.error||'')){
      localStorage.removeItem('jz_admin_token');localStorage.removeItem('jz_admin_user');
      window.location.href='admin_login.html';return true}return false}
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        /* ── 正しいアクション名・パラメータ名 ── */
        const [pRes,aRes]=await Promise.all([
          gasPost({action:'getPdfs',token:adminToken}),
          gasPost({action:'getArticles',token:adminToken}),
        ]);
        if(checkAuth(pRes)||checkAuth(aRes))return;
        if(pRes.success)setPdfs((pRes.pdfs||[]).map(normalizePdf));
        if(aRes.success)setArticles(aRes.articles||[]);
      }catch(e){console.error(e)}finally{setLoading(false)}
    })()
  },[]);
  const articleMap=useMemo(()=>{const m={};articles.forEach(a=>{m[String(a.id)]=a.title||'（無題）'});return m},[articles]);
  function flash(msg){setToast(msg);clearTimeout(window._jzt);window._jzt=setTimeout(()=>setToast(''),2300)}
  async function handleLogout(){
    try{await gasPost({action:'logout',token:adminToken})}catch{}
    localStorage.removeItem('jz_admin_token');localStorage.removeItem('jz_admin_user');
    window.location.href='admin_login.html'}
  function openNew(){setEditId(null);setForm(EMPTY_FORM);setFErr({});setOpen(true)}
  function openEdit(p){
    setEditId(p.id);
    setForm({name:p.name,drive_url:p.drive_url?('https://'+p.drive_url.replace(/^https?:\/\//,'')):'' ,desc:p.desc,article_id:p.article_id?String(p.article_id):''});
    setFErr({});setOpen(true)}
  function closeModal(){setOpen(false)}
  const urlValid=/drive\.google\.com/.test(form.drive_url)&&form.drive_url.length>22;
  function validate(){
    const e={};
    if(!form.name.trim())e.name='PDF名を入力してください';
    if(!form.drive_url.trim())e.drive_url='GoogleドライブURLを入力してください';
    else if(!/drive\.google\.com/.test(form.drive_url))e.drive_url='Googleドライブの共有URLを入力してください';
    setFErr(e);return Object.keys(e).length===0}
  async function save(){
    if(!validate())return;setSaving(true);
    const cleanUrl=form.drive_url.replace(/^https?:\/\//,'');
    const articleId=form.article_id||null;
    try{
      let res;
      if(editId){
        /* ── 正しいアクション名・パラメータ名 ── */
        res=await gasPost({action:'adminUpdatePdf',token:adminToken,id:editId,name:form.name.trim(),drive_url:cleanUrl,description:form.desc,article_id:articleId});
      }else{
        res=await gasPost({action:'adminAddPdf',token:adminToken,name:form.name.trim(),drive_url:cleanUrl,description:form.desc,article_id:articleId});
      }
      if(checkAuth(res))return;
      if(res.success){
        if(editId){
          setPdfs(ps=>ps.map(p=>p.id===editId?normalizePdf({...p,name:form.name.trim(),drive_url:cleanUrl,description:form.desc,article_id:articleId,...(res.pdf||{})}):p));
          flash('PDFを更新しました');
        }else{
          const newPdf=normalizePdf(res.pdf||{id:res.id||Date.now(),name:form.name.trim(),drive_url:cleanUrl,description:form.desc,article_id:articleId,created_at:new Date().toISOString()});
          setPdfs(ps=>[newPdf,...ps]);flash('PDFを追加しました');
        }
        closeModal();
      }else{flash('保存に失敗しました: '+(res.error||''))}
    }catch{flash('通信エラーが発生しました。')}finally{setSaving(false)}
  }
  async function del(p){
    if(!window.confirm(`「${p.name}」を削除しますか？`))return;
    setBusy(b=>({...b,[p.id]:true}));
    try{
      /* ── 正しいアクション名・パラメータ名 ── */
      const res=await gasPost({action:'adminDeletePdf',token:adminToken,id:p.id});
      if(checkAuth(res))return;
      if(res.success){setPdfs(ps=>ps.filter(x=>x.id!==p.id));flash('「'+trunc(p.name)+'」を削除しました')}
      else{flash('削除に失敗しました: '+(res.error||''))}
    }catch{flash('通信エラーが発生しました。')}finally{setBusy(b=>{const n={...b};delete n[p.id];return n})}
  }
  const filtered=useMemo(()=>{
    const s=q.trim();if(!s)return pdfs;
    return pdfs.filter(p=>{
      if(p.name.includes(s))return true;
      const t=p.article_id?(articleMap[String(p.article_id)]||''):'';
      return t.includes(s)})
  },[pdfs,q,articleMap]);
  const adminName=adminUser.name||'Admin';
  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sb-brand"><div className="mark"><span>ジ</span></div><div className="t"><div className="n">ジブンゼミ</div><div className="s">ADMIN PANEL</div></div></div>
        <nav className="sb-nav">
          <div className="sb-label">メニュー</div>
          {NAV_ITEMS.map(n=>(<a key={n.key} href={n.href} className={"sb-item"+(n.key==="pdf"?" active":"")}><Icon>{n.icon}</Icon>{n.label}</a>))}
        </nav>
        <div className="sb-foot">
          <div className="sb-user"><div className="av">{getInitial(adminName)}</div><div className="u"><div className="un">{adminName}</div><div className="ur">管理者</div></div></div>
          <button className="sb-logout" onClick={handleLogout}><Icon size={14}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>ログアウト</button>
        </div>
      </aside>
      <main className="main">
        <div className="topbar">
          <div><h1>PDF管理</h1><div className="sub">Googleドライブの共有URLを登録して、ワークシートを管理します</div></div>
          <button className="btn-add" onClick={openNew} disabled={loading}><Icon size={16}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>PDFを追加</button>
        </div>
        <div className="toolbar">
          <div className="stat-line">{loading?'読み込み中…':<React.Fragment>全 <b>{pdfs.length}</b> 件のワークシート</React.Fragment>}</div>
          <div className="search-wrap">
            <span className="s-icon"><Icon size={17}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon></span>
            <input className="search-input" type="text" placeholder="PDF名・記事名で検索" value={q} onChange={e=>setQ(e.target.value)} />
          </div>
        </div>
        <div className="panel">
          <table>
            <thead><tr><th>PDF名</th><th>紐づき記事</th><th>説明文</th><th>GoogleドライブURL</th><th>追加日</th><th style={{textAlign:'right'}}>操作</th></tr></thead>
            <tbody>
              {loading ? Array.from({length:5}).map((_,i)=>(
                <tr key={i} className="skel-row">
                  <td><div style={{display:'flex',alignItems:'center',gap:12}}><div className="skel" style={{width:34,height:40,borderRadius:6,flexShrink:0}}></div><div className="skel" style={{height:16,width:160}}></div></div></td>
                  <td><div className="skel" style={{height:14,width:160}}></div></td>
                  <td><div className="skel" style={{height:14,width:180}}></div></td>
                  <td><div className="skel" style={{height:14,width:120}}></div></td>
                  <td><div className="skel" style={{height:14,width:36}}></div></td>
                  <td><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}><div className="skel" style={{height:32,width:58}}></div><div className="skel" style={{height:32,width:50}}></div></div></td>
                </tr>
              )) : filtered.length===0 ? (
                <tr className="empty-row"><td colSpan="6">該当するPDFがありません</td></tr>
              ) : filtered.map(p=>{
                const isBusy=!!busy[p.id];
                const artTitle=p.article_id?(articleMap[String(p.article_id)]||null):null;
                const displayUrl=p.drive_url||'';
                return (
                  <tr key={p.id}>
                    <td><div className="pdf-name-cell"><div className="pdf-ic"><PdfGlyph size={16}/><span className="ext">PDF</span></div><span className="pdf-name">{p.name}</span></div></td>
                    <td>{artTitle?(<div className="linked-cell"><div className="lc-in"><span className="li"><Icon size={13}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></Icon></span><span className="lt">{artTitle}</span></div></div>):(<span className="linked-cell none">未紐づけ</span>)}</td>
                    <td><div className="desc-cell">{p.desc||'—'}</div></td>
                    <td>{displayUrl?(<a className="gdrive-url" href={'https://'+displayUrl.replace(/^https?:\/\//,'')} target="_blank" rel="noopener noreferrer"><Icon size={13}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Icon><span className="gt">{displayUrl.replace(/^https?:\/\//,'')}</span></a>):(<span style={{fontSize:'11px',color:'var(--muted)'}}>—</span>)}</td>
                    <td><span className="date-c">{fmtShortDate(p.created_at)}</span></td>
                    <td>
                      <div className="row-actions">
                        <button className="ab edit" onClick={()=>openEdit(p)} disabled={isBusy}><Icon size={12}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></Icon>編集</button>
                        <button className="ab del" onClick={()=>del(p)} disabled={isBusy}><Icon size={12}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>削除</button>
                      </div>
                    </td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        </div>
      </main>
      <div className={"overlay"+(open?" show":"")} onClick={closeModal}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <h2><span className="mi"><PdfGlyph size={16}/></span>{editId?'PDFを編集':'PDFを追加'}</h2>
            <button className="closeb" onClick={closeModal}><Icon size={17}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon></button>
          </div>
          <div className="modal-body">
            <div className="field">
              <label>PDF名 <span className="req">必須</span></label>
              <input type="text" placeholder="例：心が動いた瞬間ワークシート" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} className={fErr.name?'invalid':''} />
              {fErr.name&&<div className="err"><Icon size={13}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>{fErr.name}</div>}
            </div>
            <div className="field">
              <label>GoogleドライブURL（共有URL） <span className="req">必須</span></label>
              <input type="url" placeholder="https://drive.google.com/file/d/xxxxxx/view" value={form.drive_url} onChange={e=>setForm(f=>({...f,drive_url:e.target.value}))} className={fErr.drive_url?'invalid':''} />
              {fErr.drive_url&&<div className="err"><Icon size={13}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>{fErr.drive_url}</div>}
              {!fErr.drive_url&&urlValid&&<span className="url-ok"><Icon size={13}><polyline points="20 6 9 17 4 12"/></Icon>有効な共有URLです</span>}
              <div className="gdrive-hint"><span className="gh-ic"><Icon size={15}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon></span><span>GoogleドライブでPDFを「リンクを知っている全員が閲覧可」の共有設定にしてからURLを貼り付けてください。</span></div>
            </div>
            <div className="field">
              <label>説明文</label>
              <textarea placeholder="このワークシートの内容を1〜2行で説明します" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}></textarea>
            </div>
            <div className="field">
              <label>紐づける記事</label>
              <select value={form.article_id} onChange={e=>setForm(f=>({...f,article_id:e.target.value}))}>
                <option value="">紐づけなし</option>
                {articles.map(a=>(<option key={a.id} value={String(a.id)}>{a.title||'（無題）'}</option>))}
              </select>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn-cancel" onClick={closeModal}>キャンセル</button>
            <button className="btn-save" onClick={save} disabled={saving}>
              {saving?<React.Fragment><span className="sp-spinner"></span>保存中…</React.Fragment>:(editId?'更新する':'PDFを追加')}
            </button>
          </div>
        </div>
      </div>
      <div className={"toast"+(toast?" show":"")}><span className="tk"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>{toast}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
