<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5; --accent: #F8D423; --accent-press: #E8C40F;
    --navy: #1A3A6B; --navy-soft: #244a82; --ink: #1F1F1F;
    --white: #FFFFFF; --muted: #6B6B70; --line: #E4E4E7;
    --field: #FAFAFA; --radius: 12px; --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --ok: #1F8A5B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100%; }
  a { color: inherit; }
  .nav { height: 60px; background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 30; }
  .nav .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .brand-mark span { font-weight: 900; font-size: 16px; color: var(--navy); line-height: 1; }
  .nav .brand-name { color: var(--white); font-weight: 700; font-size: 17px; letter-spacing: 0.04em; }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .nav-link { color: rgba(255,255,255,0.82); font-size: 13px; font-weight: 700; text-decoration: none; padding: 8px 13px; border-radius: 8px; display: flex; align-items: center; gap: 7px; transition: color 0.15s, background 0.15s; cursor: pointer; background: none; border: none; font-family: inherit; }
  .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.10); }
  .nav-link.logout { color: rgba(255,255,255,0.7); }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 13px; margin-left: 4px; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 24px 64px; }
  .welcome { margin-bottom: 22px; }
  .welcome h1 { font-size: 26px; font-weight: 900; letter-spacing: 0.02em; }
  .welcome h1 .accent { position: relative; }
  .welcome h1 .accent::after { content: ""; position: absolute; left: -2px; right: -2px; bottom: 2px; height: 9px; background: var(--accent); z-index: -1; border-radius: 2px; }
  .welcome p { font-size: 13.5px; color: var(--muted); margin-top: 6px; }
  .summary { background: var(--navy); color: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 26px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; }
  .summary .s-label { font-size: 12.5px; color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 10px; letter-spacing: 0.04em; }
  .summary .s-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .summary .s-pct { font-size: 38px; font-weight: 900; line-height: 1; letter-spacing: 0.02em; }
  .summary .s-pct .unit { font-size: 18px; margin-left: 2px; }
  .summary .s-count { font-size: 13px; color: rgba(255,255,255,0.78); }
  .summary .s-count b { color: var(--accent); font-weight: 900; font-size: 15px; }
  .bar { height: 10px; background: rgba(255,255,255,0.16); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0; transition: width 1.1s cubic-bezier(.2,.7,.2,1); }
  .summary .s-stats { display: flex; gap: 26px; }
  .stat { text-align: center; }
  .stat .n { font-size: 26px; font-weight: 900; line-height: 1; }
  .stat .n.gold { color: var(--accent); }
  .stat .t { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 700; margin-top: 7px; }
  .section { margin-bottom: 34px; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-head h2 { font-size: 17px; font-weight: 900; display: flex; align-items: center; gap: 9px; }
  .sec-head h2 .tick { width: 5px; height: 18px; background: var(--accent); border-radius: 2px; display: inline-block; }
  .sec-more { font-size: 12.5px; font-weight: 700; color: var(--navy); text-decoration: none; display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-radius: 6px; transition: background 0.15s; }
  .sec-more:hover { background: rgba(26,58,107,0.07); }
  .continue { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); display: grid; grid-template-columns: 200px 1fr; overflow: hidden; cursor: pointer; transition: transform 0.1s, box-shadow 0.18s; border: 1.5px solid transparent; text-decoration: none; }
  .continue:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.14); border-color: var(--accent); }
  .thumb { background: var(--field); position: relative; overflow: hidden; display: grid; place-items: center; min-height: 150px; }
  .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .thumb .ph-stripes { position: absolute; inset: 0; opacity: 0.5; }
  .thumb .ph-label { position: relative; font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.85); padding: 4px 8px; border-radius: 5px; }
  .continue .c-body { padding: 22px 24px; display: flex; flex-direction: column; justify-content: center; }
  .continue .c-tagrow { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .resume-tag { font-size: 10.5px; font-weight: 900; color: var(--ink); background: var(--accent); padding: 3px 9px; border-radius: 99px; }
  .continue h3 { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
  .continue .c-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .continue .c-progress { display: flex; align-items: center; gap: 12px; }
  .mini-bar { flex: 1; height: 6px; background: var(--line); border-radius: 99px; overflow: hidden; max-width: 260px; }
  .mini-bar > div { height: 100%; background: var(--navy); border-radius: 99px; }
  .continue .c-pct { font-size: 12px; font-weight: 900; color: var(--navy); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card-art { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.12s, box-shadow 0.18s; border: 1.5px solid transparent; text-decoration: none; color: inherit; }
  .card-art:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,0,0,0.14); border-color: rgba(248,212,35,0.6); }
  .card-art .thumb { min-height: 130px; }
  .read-badge { position: absolute; top: 10px; right: 10px; font-size: 10.5px; font-weight: 900; padding: 4px 9px; border-radius: 99px; display: flex; align-items: center; gap: 4px; z-index: 2; }
  .read-badge.done { background: var(--ok); color: var(--white); }
  .read-badge.unread { background: var(--white); color: var(--muted); border: 1px solid var(--line); }
  .card-body { padding: 15px 16px 17px; display: flex; flex-direction: column; flex: 1; }
  .cat-tag { align-self: flex-start; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 6px; margin-bottom: 10px; }
  .card-body h3 { font-size: 14.5px; font-weight: 700; line-height: 1.5; margin-bottom: 10px; flex: 1; }
  .card-foot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .card-foot .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--line); }
  .rec-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .rec-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; cursor: pointer; display: flex; gap: 16px; align-items: flex-start; transition: transform 0.12s, box-shadow 0.18s; border: 1.5px solid transparent; text-decoration: none; color: inherit; }
  .rec-card:hover { box-shadow: 0 8px 22px rgba(0,0,0,0.13); border-color: rgba(248,212,35,0.6); }
  .rec-icon { width: 46px; height: 46px; border-radius: 11px; flex-shrink: 0; display: grid; place-items: center; background: rgba(248,212,35,0.2); color: #9a7d00; }
  .rec-body { flex: 1; }
  .rec-card .cat-tag { margin-bottom: 8px; }
  .rec-body h3 { font-size: 14.5px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
  .rec-body p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .rec-cta { margin-top: 12px; font-size: 12px; font-weight: 900; color: var(--navy); display: inline-flex; align-items: center; gap: 5px; }
  .skeleton { background: linear-gradient(90deg, var(--line) 25%, #f0f0f2 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .sk-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .sk-thumb { height: 130px; }
  .sk-body { padding: 15px 16px; }
  .sk-line { height: 12px; margin-bottom: 10px; }
  .sk-line.short { width: 60%; } .sk-line.med { width: 85%; } .sk-line.full { width: 100%; }
  .foot { margin-top: 14px; font-size: 11px; color: #A0A0A6; text-align: center; }
  .cat-self     { background: rgba(248,212,35,0.22); color: #8a7000; }
  .cat-es       { background: rgba(26,58,107,0.10); color: var(--navy); }
  .cat-mensetsu { background: rgba(31,138,91,0.12); color: var(--ok); }
  .cat-gyokai   { background: rgba(176,84,43,0.12); color: #9c4a25; }
  .cat-career   { background: rgba(107,70,193,0.12); color: #5a37b0; }
  .cat-other    { background: rgba(100,100,100,0.10); color: var(--muted); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty svg { margin-bottom: 12px; opacity: 0.4; }
  @media (max-width: 880px) { .grid { grid-template-columns: repeat(2,1fr); } .summary { grid-template-columns: 1fr; gap: 20px; } }
  @media (max-width: 620px) { .nav { padding: 0 16px; } .nav-right .nav-link span.txt { display: none; } .nav-link { padding: 8px; } .wrap { padding: 22px 16px 52px; } .welcome h1 { font-size: 22px; } .continue { grid-template-columns: 1fr; } .grid { grid-template-columns: 1fr; } .rec-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

function getCatStyle(name = '') {
  if (/自己/.test(name))          return 'cat-self';
  if (/ES|エントリー/.test(name)) return 'cat-es';
  if (/面接/.test(name))           return 'cat-mensetsu';
  if (/業界/.test(name))           return 'cat-gyokai';
  if (/キャリア/.test(name))       return 'cat-career';
  return 'cat-other';
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

/* ── 読了時間を文字数から推定（日本語400字/分） ── */
function estimateReadTime(article) {
  const text = [article.title || '', article.description || ''].join('');
  const chars = text.length;
  /* descriptionは本文の一部なのでnote記事は平均2000字と仮定して底上げ */
  const estimated = Math.max(1, Math.round((chars + 1500) / 400));
  return estimated;
}

function calcStreak(logs) {
  if (!logs || logs.length === 0) return 0;
  const days = [...new Set(logs.map(l => {
    const d = new Date(l.read_at || l.created_at || '');
    return isNaN(d) ? null : d.toISOString().slice(0, 10);
  }).filter(Boolean))].sort().reverse();
  if (days.length === 0) return 0;
  let streak = 1;
  for (let i = 0; i < days.length - 1; i++) {
    const diff = (new Date(days[i]) - new Date(days[i+1])) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

function Stripes({ seed = 0 }) {
  const id = "s" + seed;
  return (
    <svg className="ph-stripes" width="100%" height="100%" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <pattern id={id} width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#FAFAFA"/>
          <line x1="0" y1="0" x2="0" y2="14" stroke="#E4E4E7" strokeWidth="7"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill={"url(#"+id+")"}/>
    </svg>
  );
}

function Thumb({ article, seed, label }) {
  const url = article && (article.thumbnail_url || article.thumb_url);
  return (
    <div className="thumb">
      {url
        ? <img src={url} alt={article.title || ''} onError={e => { e.target.style.display='none'; }} />
        : <React.Fragment><Stripes seed={seed} /><span className="ph-label">{label || '記事サムネイル'}</span></React.Fragment>
      }
    </div>
  );
}

function CheckSmall({ color }) {
  return <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
}
function Arrow() {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>;
}

function SkeletonGrid() {
  return (
    <div className="grid">
      {[1,2,3].map(i => (
        <div className="sk-card" key={i}>
          <div className="sk-thumb skeleton"></div>
          <div className="sk-body">
            <div className="sk-line short skeleton"></div>
            <div className="sk-line full skeleton"></div>
            <div className="sk-line med skeleton"></div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [user] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jz_user') || '{}'); } catch { return {}; }
  });

  const [articles,   setArticles]   = useState([]);
  const [categories, setCategories] = useState([]);
  const [logs,       setLogs]       = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [pct,        setPct]        = useState(0);

  useEffect(() => {
    const token = localStorage.getItem('jz_token');
    if (!token) { window.location.href = 'login.html'; return; }

    (async () => {
      try {
        const [aData, lData, cData] = await Promise.all([
          gasPost({ action: 'getArticles',    token }),
          gasPost({ action: 'getReadingLogs', token }),
          gasPost({ action: 'getCategories',  token }),
        ]);

        if (aData.success === false && /認証|token|auth/i.test(aData.error || '')) {
          localStorage.removeItem('jz_token');
          localStorage.removeItem('jz_user');
          window.location.href = 'login.html';
          return;
        }

        if (aData.success) setArticles(aData.articles   || []);
        if (lData.success) setLogs(lData.logs            || []);
        if (cData.success) setCategories(cData.categories || []);
      } catch (e) {
        console.error('fetch error', e);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const catById = {};
  categories.forEach(c => { catById[String(c.id)] = c.name || ''; });
  function catLabel(a) {
    return catById[String(a.category_id)] || catById[String(a.category)] || a.category || '';
  }

  const readSet   = new Set(logs.map(l => String(l.article_id)));
  const total     = articles.length;
  const doneCount = articles.filter(a => readSet.has(String(a.id))).length;
  const target    = total > 0 ? Math.round(doneCount / total * 100) : 0;
  const streak    = calcStreak(logs);

  useEffect(() => {
    if (!loading) {
      const t = setTimeout(() => setPct(target), 200);
      return () => clearTimeout(t);
    }
  }, [loading, target]);

  const sorted = [...articles].sort((a, b) => {
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });
  const latest = sorted.slice(0, 3);
  const reco   = articles.filter(a => !readSet.has(String(a.id))).slice(0, 2);

  /* ── 「続きを読む」の判定を修正 ──
     ログがある記事のうち、未完了（is_completed が false）のものを優先。
     なければ未読記事の先頭を表示。ログがなければ非表示。 */
  const continueArt = (() => {
    if (logs.length === 0) return null;
    /* 未完了ログがある記事を探す */
    const incompleteLogs = logs.filter(l => !l.is_completed && l.is_completed !== 'TRUE');
    if (incompleteLogs.length > 0) {
      const lastIncomplete = incompleteLogs[incompleteLogs.length - 1];
      return articles.find(a => String(a.id) === String(lastIncomplete.article_id)) || null;
    }
    return null;
  })();

  const continueLog = continueArt
    ? logs.filter(l => String(l.article_id) === String(continueArt.id)).slice(-1)[0]
    : null;

  async function handleLogout() {
    const token = localStorage.getItem('jz_token');
    try { await gasPost({ action: 'logout', token }); } catch {}
    localStorage.removeItem('jz_token');
    localStorage.removeItem('jz_user');
    window.location.href = 'login.html';
  }

  const displayName = (user.name || 'ユーザー').split(/[\s　]/)[0];
  const avatarChar  = displayName.charAt(0);

  return (
    <React.Fragment>
      <nav className="nav">
        <div className="brand">
          <div className="brand-mark"><span>ジ</span></div>
          <div className="brand-name">ジブンゼミ</div>
        </div>
        <div className="nav-right">
          <a className="nav-link" href="home.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span className="txt">ホーム</span>
          </a>
          <a className="nav-link" href="mypage.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span className="txt">マイページ</span>
          </a>
          <button className="nav-link logout" onClick={handleLogout}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span className="txt">ログアウト</span>
          </button>
          <div className="nav-avatar">{avatarChar}</div>
        </div>
      </nav>

      <div className="wrap">
        <div className="welcome">
          <h1>おかえり、<span className="accent">{displayName}</span>さん 👋</h1>
          <p>今日も自分と向き合う時間をつくりましょう。続きから再開できます。</p>
        </div>

        <div className="summary">
          <div>
            <div className="s-label">全体の読了率</div>
            <div className="s-top">
              <div className="s-pct">{pct}<span className="unit">%</span></div>
              <div className="s-count">全 <b>{total}</b> 記事中 <b>{doneCount}</b> 記事を読了</div>
            </div>
            <div className="bar"><div className="bar-fill" style={{width: pct+"%"}}></div></div>
          </div>
          <div className="s-stats">
            <div className="stat"><div className="n gold">{doneCount}</div><div className="t">読了</div></div>
            <div className="stat"><div className="n">{total - doneCount}</div><div className="t">未読</div></div>
            <div className="stat"><div className="n">{streak}</div><div className="t">連続日数</div></div>
          </div>
        </div>

        {/* 続きを読む：未完了ログがある記事のみ表示 */}
        {continueArt && (
          <div className="section">
            <div className="sec-head">
              <h2><span className="tick"></span>続きを読む</h2>
            </div>
            <a className="continue" href={`article_detail.html?id=${continueArt.id}`}>
              <Thumb article={continueArt} seed={1} />
              <div className="c-body">
                <div className="c-tagrow">
                  <span className="resume-tag">前回の続き</span>
                  {catLabel(continueArt) && (
                    <span className={"cat-tag "+getCatStyle(catLabel(continueArt))}>
                      {catLabel(continueArt)}
                    </span>
                  )}
                </div>
                <h3>{continueArt.title}</h3>
                <div className="c-meta">
                  最終アクセス：{continueLog ? fmtDate(continueLog.read_at) : '—'}
                  　・　約{estimateReadTime(continueArt)}分で読める
                </div>
                <div className="c-progress">
                  <div className="mini-bar"><div style={{width:"30%"}}></div></div>
                  <span className="c-pct">読み途中</span>
                </div>
              </div>
            </a>
          </div>
        )}

        <div className="section">
          <div className="sec-head">
            <h2><span className="tick"></span>最新の記事</h2>
            <a className="sec-more" href="articles.html">すべて見る <Arrow /></a>
          </div>
          {loading ? <SkeletonGrid /> : latest.length === 0 ? (
            <div className="empty">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <p>記事はまだありません</p>
            </div>
          ) : (
            <div className="grid">
              {latest.map((a, i) => {
                const isRead = readSet.has(String(a.id));
                const cat = catLabel(a);
                return (
                  <a className="card-art" key={a.id} href={`article_detail.html?id=${a.id}`}>
                    <div style={{position:"relative"}}>
                      <span className={"read-badge "+(isRead?"done":"unread")}>
                        {isRead ? <React.Fragment><CheckSmall color="#fff" />読了</React.Fragment> : "未読"}
                      </span>
                      <Thumb article={a} seed={i+2} />
                    </div>
                    <div className="card-body">
                      {cat && <span className={"cat-tag "+getCatStyle(cat)}>{cat}</span>}
                      <h3>{a.title}</h3>
                      <div className="card-foot">
                        <span>{fmtDate(a.created_at)}</span>
                        <span className="dot"></span>
                        <span>約{estimateReadTime(a)}分で読める</span>
                      </div>
                    </div>
                  </a>
                );
              })}
            </div>
          )}
        </div>

        {!loading && reco.length > 0 && (
          <div className="section">
            <div className="sec-head">
              <h2><span className="tick"></span>あなたへのおすすめ</h2>
              <a className="sec-more" href="articles.html">もっと見る <Arrow /></a>
            </div>
            <div className="rec-grid">
              {reco.map(r => {
                const cat = catLabel(r);
                return (
                  <a className="rec-card" key={r.id} href={`article_detail.html?id=${r.id}`}>
                    <div className="rec-icon">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <div className="rec-body">
                      {cat && <span className={"cat-tag "+getCatStyle(cat)}>{cat}</span>}
                      <h3>{r.title}</h3>
                      <p>{r.description ? r.description.slice(0,60)+'…' : '記事を読んで学びを深めましょう。'}</p>
                      <span className="rec-cta">この記事を読む <Arrow /></span>
                    </div>
                  </a>
                );
              })}
            </div>
          </div>
        )}

        <div className="foot">© 2026 ジブンゼミ　月額500円のキャリア支援サブスク</div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
