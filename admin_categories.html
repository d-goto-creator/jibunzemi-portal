<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜カテゴリ管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5;
    --accent: #F8D423;
    --accent-press: #E8C40F;
    --navy: #1A3A6B;
    --ink: #1F1F1F;
    --white: #FFFFFF;
    --muted: #6B6B70;
    --line: #E4E4E7;
    --field: #FAFAFA;
    --radius: 12px;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --ok: #1F8A5B;
    --danger: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { min-height: 100%; }

  .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar { background: var(--navy); color: var(--white); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sb-brand { display: flex; align-items: center; gap: 11px; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.10); }
  .sb-brand .mark { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .sb-brand .mark span { font-weight: 900; font-size: 17px; color: var(--navy); }
  .sb-brand .t { line-height: 1.2; }
  .sb-brand .t .n { font-weight: 700; font-size: 15px; letter-spacing: 0.03em; }
  .sb-brand .t .s { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.08em; }
  .sb-nav { flex: 1; padding: 14px 12px; display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
  .sb-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; padding: 10px 12px 6px; }
  .sb-item { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 9px; color: rgba(255,255,255,0.78); font-size: 13.5px; font-weight: 700; cursor: pointer; border: none; background: none; font-family: inherit; text-align: left; width: 100%; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .sb-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
  .sb-item.active { background: var(--accent); color: var(--ink); }
  .sb-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,0.10); display: flex; flex-direction: column; gap: 8px; }
  .sb-user { display: flex; align-items: center; gap: 11px; padding: 8px 6px; }
  .sb-user .av { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 14px; flex-shrink: 0; }
  .sb-user .u { line-height: 1.3; }
  .sb-user .u .un { font-size: 13px; font-weight: 700; }
  .sb-user .u .ur { font-size: 10.5px; color: rgba(255,255,255,0.55); }
  .sb-logout { display: flex; align-items: center; gap: 9px; font-family: inherit; font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.6); background: none; border: none; cursor: pointer; padding: 8px 10px; border-radius: 8px; width: 100%; transition: all 0.15s; }
  .sb-logout:hover { color: #ff8a7a; background: rgba(192,57,43,0.12); }

  /* ── Main ── */
  .main { padding: 26px 32px 48px; max-width: 920px; }
  .topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; gap: 16px; }
  .topbar h1 { font-size: 23px; font-weight: 900; }
  .topbar .sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .btn-add { font-family: inherit; font-size: 13.5px; font-weight: 900; color: var(--ink); background: var(--accent); border: none; border-radius: 10px; padding: 12px 18px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 3px 10px rgba(248,212,35,0.4); transition: all 0.15s; }
  .btn-add:hover { background: var(--accent-press); box-shadow: 0 5px 14px rgba(248,212,35,0.5); }
  .btn-add:active { transform: translateY(1px); }
  .btn-add:disabled { background: #eee; color: #aaa; cursor: not-allowed; box-shadow: none; }

  .hint-bar { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--muted); margin-bottom: 16px; }
  .hint-bar .hi { color: var(--navy); }

  /* ── Category list ── */
  .cat-list { display: flex; flex-direction: column; gap: 12px; }
  .cat-row {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 4px; padding: 16px 18px;
    border: 1.5px solid transparent; transition: box-shadow 0.16s, border-color 0.16s, opacity 0.16s, transform 0.16s;
  }
  .cat-row.dragging { opacity: 0.5; border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.18); }
  .cat-row.drop-target { border-color: var(--accent); }
  .drag-handle { cursor: grab; color: #C4C4CA; padding: 6px 8px 6px 4px; display: grid; place-items: center; flex-shrink: 0; transition: color 0.15s; }
  .drag-handle:hover { color: var(--muted); }
  .drag-handle:active { cursor: grabbing; }
  .order-num { width: 26px; height: 26px; border-radius: 7px; background: var(--field); border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 900; display: grid; place-items: center; flex-shrink: 0; margin-right: 12px; }
  .cat-chip { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; margin-right: 13px; }
  .cat-info { flex: 1; min-width: 0; }
  .cat-info .cn { font-size: 14.5px; font-weight: 700; }
  .cat-info .cd { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .cat-count { display: flex; align-items: center; gap: 7px; background: var(--field); border: 1.5px solid var(--line); border-radius: 99px; padding: 6px 13px; font-size: 12.5px; font-weight: 700; white-space: nowrap; margin-right: 14px; flex-shrink: 0; }
  .cat-count b { font-weight: 900; }
  .cat-count .ci { color: var(--navy); }
  .row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ab { font-family: inherit; font-size: 11.5px; font-weight: 700; border-radius: 7px; padding: 7px 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; border: 1.5px solid var(--line); background: var(--white); }
  .ab:disabled { opacity: 0.5; cursor: not-allowed; }
  .ab.edit { color: var(--navy); }
  .ab.edit:hover { border-color: var(--navy); background: var(--field); }
  .ab.del { color: var(--danger); }
  .ab.del:hover { border-color: var(--danger); background: #FDF3F2; }

  /* skeleton */
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel { background: linear-gradient(90deg, #eee 25%, #f8f8f8 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 6px; }
  .skel-row { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; padding: 18px 18px; }

  /* ── Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(20,30,50,0.42); opacity: 0; pointer-events: none; transition: opacity 0.22s; z-index: 40; display: grid; place-items: center; padding: 24px; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .modal { width: 460px; max-width: 100%; background: var(--bg); border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: translateY(16px) scale(0.98); transition: transform 0.24s cubic-bezier(.3,.7,.2,1); display: flex; flex-direction: column; overflow: hidden; }
  .overlay.show .modal { transform: translateY(0) scale(1); }
  .modal-head { background: var(--white); padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h2 { font-size: 17px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
  .modal-head h2 .mi { width: 30px; height: 30px; border-radius: 8px; background: rgba(26,58,107,0.08); color: var(--navy); display: grid; place-items: center; }
  .modal-head .closeb { border: none; background: var(--field); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; color: var(--muted); display: grid; place-items: center; transition: all 0.15s; }
  .modal-head .closeb:hover { background: var(--line); color: var(--ink); }
  .modal-body { padding: 22px 24px; }
  .modal-foot { background: var(--white); padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 12px; }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 700; margin-bottom: 7px; }
  .req { font-size: 10px; font-weight: 700; color: var(--danger); background: rgba(192,57,43,0.10); padding: 1px 6px; border-radius: 4px; }
  .field input[type=text], .field textarea {
    width: 100%; font-family: inherit; font-size: 13.5px; color: var(--ink); background: var(--white);
    border: 1.5px solid var(--line); border-radius: 9px; padding: 11px 13px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(248,212,35,0.22); }
  .field input.invalid { border-color: var(--danger); background: #FDF3F2; }
  .err { font-size: 11.5px; color: var(--danger); margin-top: 6px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

  /* delete confirm */
  .del-icon { width: 52px; height: 52px; border-radius: 50%; background: rgba(192,57,43,0.10); color: var(--danger); display: grid; place-items: center; margin: 0 auto 16px; }
  .del-modal { width: 420px; }
  .del-modal .modal-body { text-align: center; }
  .del-modal h2 { font-size: 18px; font-weight: 900; margin-bottom: 10px; }
  .del-modal .dm-text { font-size: 13.5px; color: var(--muted); line-height: 1.7; }
  .del-modal .dm-text b { color: var(--ink); font-weight: 700; }
  .del-warn { background: rgba(192,57,43,0.07); border: 1.5px solid rgba(192,57,43,0.2); border-radius: 10px; padding: 13px 15px; margin-top: 16px; font-size: 12.5px; color: #8a2c20; display: flex; gap: 9px; text-align: left; line-height: 1.6; }
  .del-warn .dwi { flex-shrink: 0; margin-top: 1px; }
  .btn-danger { flex: 1; font-family: inherit; font-size: 14px; font-weight: 900; color: var(--white); background: var(--danger); border: none; border-radius: 10px; padding: 13px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-danger:hover { background: #a52f23; }
  .btn-danger:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

  .btn-save { flex: 1; font-family: inherit; font-size: 14px; font-weight: 900; color: var(--ink); background: var(--accent); border: none; border-radius: 10px; padding: 13px; cursor: pointer; box-shadow: 0 3px 10px rgba(248,212,35,0.4); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-save:hover { background: var(--accent-press); }
  .btn-save:disabled { background: #eee; color: #aaa; cursor: not-allowed; box-shadow: none; }
  .btn-cancel { font-family: inherit; font-size: 14px; font-weight: 700; color: var(--ink); background: var(--white); border: 1.5px solid var(--line); border-radius: 10px; padding: 13px 24px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { background: var(--field); border-color: var(--muted); }
  .sp-spinner { width: 15px; height: 15px; border: 2.5px solid rgba(31,31,31,0.15); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .sp-spinner-w { border-top-color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast */
  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); background: var(--navy); color: var(--white); font-size: 13px; font-weight: 500; padding: 13px 22px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.22); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 60; display: flex; align-items: center; gap: 9px; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .tk { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── GAS API エンドポイント ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

/* ── カテゴリカラーパレット (cc-0..cc-7 と同一) ── */
const PALETTE = ['#F8D423','#1A3A6B','#7c3aed','#1F8A5B','#c0392b','#e55039','#0891b2','#6d28d9'];

/* ── ユーティリティ ── */
function getInitial(name) { return String(name || 'A').replace(/\s+/,'').charAt(0); }

/* ── カテゴリ正規化 ── */
function normalizeCat(c, i) {
  return {
    id:    c.id,
    name:  c.name || '（無題）',
    desc:  c.description || c.desc || '',
    count: Number(c.article_count || c.count || 0),
    color: c.color || PALETTE[i % PALETTE.length],
  };
}

/* ── Icon ── */
function Icon({ children, size = 18 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
}

const NAV_ITEMS = [
  { key: "dash",     label: "ダッシュボード", href: "admin_dashboard.html",  icon: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></> },
  { key: "users",    label: "ユーザー管理",   href: "admin_users.html",      icon: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></> },
  { key: "articles", label: "記事管理",       href: "admin_articles.html",   icon: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></> },
  { key: "pdf",      label: "PDF管理",        href: "admin_pdfs.html",       icon: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></> },
  { key: "cat",      label: "カテゴリ管理",   href: "admin_categories.html", icon: <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></> },
  { key: "stats",    label: "統計",           href: "admin_stats.html",      icon: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></> },
];

function App() {
  /* ── 管理者認証ガード ── */
  const adminToken = localStorage.getItem('jz_admin_token');
  const adminUser  = (() => { try { return JSON.parse(localStorage.getItem('jz_admin_user') || '{}'); } catch { return {}; } })();
  if (!adminToken) { window.location.href = 'admin_login.html'; return null; }

  const [cats,      setCats]      = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [modal,     setModal]     = useState(null); // {mode:'new'|'edit', id}
  const [form,      setForm]      = useState({ name: '', desc: '' });
  const [fErr,      setFErr]      = useState({});
  const [saving,    setSaving]    = useState(false);
  const [delTarget, setDelTarget] = useState(null);
  const [deleting,  setDeleting]  = useState(false);
  const [toast,     setToast]     = useState('');

  const dragIdx = useRef(null);
  const prevCats = useRef(null);
  const [dragging, setDragging] = useState(null);
  const [over,     setOver]     = useState(null);

  /* ── セッション切れチェック ── */
  function checkAuth(res) {
    if (res.success === false && /認証|token|auth/i.test(res.error || '')) {
      localStorage.removeItem('jz_admin_token');
      localStorage.removeItem('jz_admin_user');
      window.location.href = 'admin_login.html';
      return true;
    }
    return false;
  }

  /* ── 初期ロード ── */
  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const res = await gasPost({ action: 'getAdminCategories', adminToken });
        if (checkAuth(res)) return;
        if (res.success) setCats((res.categories || []).map(normalizeCat));
      } catch (e) {
        console.error('admin_categories load error:', e);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  function flash(msg) {
    setToast(msg);
    clearTimeout(window._jzt);
    window._jzt = setTimeout(() => setToast(''), 2300);
  }

  /* ── ログアウト ── */
  async function handleLogout() {
    try { await gasPost({ action: 'adminLogout', adminToken }); } catch {}
    localStorage.removeItem('jz_admin_token');
    localStorage.removeItem('jz_admin_user');
    window.location.href = 'admin_login.html';
  }

  /* ── ドラッグ＆ドロップ ── */
  function onDragStart(i) { dragIdx.current = i; setDragging(i); prevCats.current = cats; }
  function onDragOver(e, i) { e.preventDefault(); if (i !== over) setOver(i); }
  function onDrop(i) {
    const from = dragIdx.current;
    if (from == null || from === i) { resetDrag(); return; }
    const next = [...cats];
    const [moved] = next.splice(from, 1);
    next.splice(i, 0, moved);
    setCats(next);
    resetDrag();
    // 並び順をAPIに保存
    saveOrder(next);
  }
  function resetDrag() { dragIdx.current = null; setDragging(null); setOver(null); }

  async function saveOrder(ordered) {
    try {
      const res = await gasPost({
        action: 'reorderCategories',
        adminToken,
        categoryIds: ordered.map(c => c.id),
      });
      if (checkAuth(res)) return;
      if (res.success) {
        flash('並び順を変更しました');
      } else {
        // 失敗時は元に戻す
        if (prevCats.current) setCats(prevCats.current);
        flash('並び替えの保存に失敗しました: ' + (res.error || ''));
      }
    } catch {
      if (prevCats.current) setCats(prevCats.current);
      flash('通信エラーが発生しました。');
    }
  }

  /* ── モーダル: 新規 ── */
  function openNew() {
    setModal({ mode: 'new' });
    setForm({ name: '', desc: '' });
    setFErr({});
  }

  /* ── モーダル: 編集 ── */
  function openEdit(c) {
    setModal({ mode: 'edit', id: c.id });
    setForm({ name: c.name, desc: c.desc });
    setFErr({});
  }
  function closeModal() { if (!saving) setModal(null); }

  /* ── 保存 (追加/更新) ── */
  async function save() {
    const e = {};
    if (!form.name.trim()) e.name = 'カテゴリ名を入力してください';
    setFErr(e);
    if (Object.keys(e).length > 0) return;
    setSaving(true);
    try {
      let res;
      if (modal.mode === 'edit') {
        res = await gasPost({
          action: 'updateCategory', adminToken, categoryId: modal.id,
          name: form.name.trim(), description: form.desc,
        });
      } else {
        const color = PALETTE[cats.length % PALETTE.length];
        res = await gasPost({
          action: 'addCategory', adminToken,
          name: form.name.trim(), description: form.desc, color,
        });
      }
      if (checkAuth(res)) return;
      if (res.success) {
        if (modal.mode === 'edit') {
          setCats(cs => cs.map(c => c.id === modal.id
            ? { ...c, name: form.name.trim(), desc: form.desc }
            : c));
          flash('カテゴリを更新しました');
        } else {
          const newCat = normalizeCat(res.category || {
            id: res.id || Date.now(),
            name: form.name.trim(), desc: form.desc,
            count: 0, color: PALETTE[cats.length % PALETTE.length],
          }, cats.length);
          setCats(cs => [...cs, newCat]);
          flash('カテゴリを追加しました');
        }
        setModal(null);
      } else {
        flash('保存に失敗しました: ' + (res.error || ''));
      }
    } catch {
      flash('通信エラーが発生しました。');
    } finally {
      setSaving(false);
    }
  }

  /* ── 削除確定 ── */
  async function confirmDelete() {
    if (!delTarget) return;
    setDeleting(true);
    try {
      const res = await gasPost({ action: 'deleteCategory', adminToken, categoryId: delTarget.id });
      if (checkAuth(res)) return;
      if (res.success) {
        const name = delTarget.name;
        setCats(cs => cs.filter(c => c.id !== delTarget.id));
        setDelTarget(null);
        flash('「' + name + '」を削除しました');
      } else {
        flash('削除に失敗しました: ' + (res.error || ''));
      }
    } catch {
      flash('通信エラーが発生しました。');
    } finally {
      setDeleting(false);
    }
  }

  const adminName = adminUser.name || 'Admin';

  return (
    <div className="shell">
      {/* ── サイドバー ── */}
      <aside className="sidebar">
        <div className="sb-brand">
          <div className="mark"><span>ジ</span></div>
          <div className="t">
            <div className="n">ジブンゼミ</div>
            <div className="s">ADMIN PANEL</div>
          </div>
        </div>
        <nav className="sb-nav">
          <div className="sb-label">メニュー</div>
          {NAV_ITEMS.map(n => (
            <a key={n.key} href={n.href}
               className={"sb-item" + (n.key === "cat" ? " active" : "")}>
              <Icon>{n.icon}</Icon>
              {n.label}
            </a>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-user">
            <div className="av">{getInitial(adminName)}</div>
            <div className="u">
              <div className="un">{adminName}</div>
              <div className="ur">管理者</div>
            </div>
          </div>
          <button className="sb-logout" onClick={handleLogout}>
            <Icon size={14}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>
            ログアウト
          </button>
        </div>
      </aside>

      {/* ── メイン ── */}
      <main className="main">
        <div className="topbar">
          <div>
            <h1>カテゴリ管理</h1>
            <div className="sub">記事カテゴリの追加・編集・並び順を管理します</div>
          </div>
          <button className="btn-add" onClick={openNew} disabled={loading}>
            <Icon size={16}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>
            カテゴリを追加
          </button>
        </div>

        <div className="hint-bar">
          <span className="hi">
            <Icon size={15}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></Icon>
          </span>
          ハンドルをドラッグすると並び順を変更できます。この順序がユーザー画面のフィルタ表示順になります。
        </div>

        <div className="cat-list">
          {loading ? (
            Array.from({length: 4}).map((_, i) => (
              <div key={i} className="skel-row">
                <div className="skel" style={{width:18,height:18,borderRadius:4,flexShrink:0}}></div>
                <div className="skel" style={{width:26,height:26,borderRadius:7,flexShrink:0}}></div>
                <div className="skel" style={{width:12,height:12,borderRadius:4,flexShrink:0}}></div>
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                  <div className="skel" style={{height:16,width:120}}></div>
                  <div className="skel" style={{height:12,width:220}}></div>
                </div>
                <div className="skel" style={{width:80,height:32,borderRadius:99}}></div>
                <div style={{display:'flex',gap:6}}><div className="skel" style={{width:58,height:32}}></div><div className="skel" style={{width:50,height:32}}></div></div>
              </div>
            ))
          ) : cats.map((c, i) => (
            <div
              key={c.id}
              className={"cat-row" + (dragging === i ? " dragging" : "") + (over === i && dragging !== null && dragging !== i ? " drop-target" : "")}
              draggable
              onDragStart={() => onDragStart(i)}
              onDragOver={(e) => onDragOver(e, i)}
              onDrop={() => onDrop(i)}
              onDragEnd={resetDrag}
            >
              <span className="drag-handle" title="ドラッグで並べ替え">
                <Icon size={18}><circle cx="9" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="15" cy="18" r="1.4"/></Icon>
              </span>
              <span className="order-num">{i + 1}</span>
              <span className="cat-chip" style={{ background: c.color }}></span>
              <div className="cat-info">
                <div className="cn">{c.name}</div>
                <div className="cd">{c.desc || '説明なし'}</div>
              </div>
              <div className="cat-count">
                <span className="ci">
                  <Icon size={13}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></Icon>
                </span>
                <b>{c.count}</b> 記事
              </div>
              <div className="row-actions">
                <button className="ab edit" onClick={() => openEdit(c)}>
                  <Icon size={12}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></Icon>
                  編集
                </button>
                <button className="ab del" onClick={() => setDelTarget(c)}>
                  <Icon size={12}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>
                  削除
                </button>
              </div>
            </div>
          ))}
        </div>
      </main>

      {/* ── 追加/編集モーダル ── */}
      <div className={"overlay" + (modal ? " show" : "")} onClick={closeModal}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          <div className="modal-head">
            <h2>
              <span className="mi">
                <Icon size={16}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></Icon>
              </span>
              {modal && modal.mode === 'edit' ? 'カテゴリを編集' : 'カテゴリを追加'}
            </h2>
            <button className="closeb" onClick={closeModal}>
              <Icon size={17}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>
            </button>
          </div>
          <div className="modal-body">
            <div className="field">
              <label>カテゴリ名 <span className="req">必須</span></label>
              <input type="text"
                placeholder="例：自己分析"
                value={form.name}
                onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                className={fErr.name ? 'invalid' : ''} />
              {fErr.name && (
                <div className="err">
                  <Icon size={13}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>
                  {fErr.name}
                </div>
              )}
            </div>
            <div className="field">
              <label>説明文</label>
              <textarea
                placeholder="このカテゴリの内容を簡潔に説明します"
                value={form.desc}
                onChange={e => setForm(f => ({ ...f, desc: e.target.value }))}></textarea>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn-cancel" onClick={closeModal} disabled={saving}>キャンセル</button>
            <button className="btn-save" onClick={save} disabled={saving}>
              {saving
                ? <React.Fragment><span className="sp-spinner"></span>保存中…</React.Fragment>
                : (modal && modal.mode === 'edit' ? '更新する' : '追加する')
              }
            </button>
          </div>
        </div>
      </div>

      {/* ── 削除確認モーダル ── */}
      <div className={"overlay" + (delTarget ? " show" : "")} onClick={() => !deleting && setDelTarget(null)}>
        <div className="modal del-modal" onClick={e => e.stopPropagation()}>
          <div className="modal-body">
            <div className="del-icon">
              <Icon size={26}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>
            </div>
            <h2>カテゴリを削除しますか？</h2>
            <div className="dm-text">
              「<b>{delTarget && delTarget.name}</b>」を削除しようとしています。
            </div>
            {delTarget && delTarget.count > 0 && (
              <div className="del-warn">
                <span className="dwi">
                  <Icon size={16}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>
                </span>
                <span>このカテゴリには <b>{delTarget && delTarget.count}件</b> の記事があります。削除すると、これらの記事は「未分類」になります。削除してもよいですか？</span>
              </div>
            )}
          </div>
          <div className="modal-foot">
            <button className="btn-cancel" onClick={() => setDelTarget(null)} disabled={deleting}>キャンセル</button>
            <button className="btn-danger" onClick={confirmDelete} disabled={deleting}>
              {deleting
                ? <React.Fragment><span className="sp-spinner sp-spinner-w"></span>削除中…</React.Fragment>
                : '削除する'
              }
            </button>
          </div>
        </div>
      </div>

      {/* トースト */}
      <div className={"toast" + (toast ? " show" : "")}>
        <span className="tk">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span>
        {toast}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
