<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜統計・分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5;
    --accent: #F8D423;
    --accent-press: #E8C40F;
    --navy: #1A3A6B;
    --ink: #1F1F1F;
    --white: #FFFFFF;
    --muted: #6B6B70;
    --line: #E4E4E7;
    --field: #FAFAFA;
    --radius: 12px;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --ok: #1F8A5B;
    --danger: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { min-height: 100%; }

  .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar { background: var(--navy); color: var(--white); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .sb-brand { display: flex; align-items: center; gap: 11px; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.10); }
  .sb-brand .mark { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .sb-brand .mark span { font-weight: 900; font-size: 17px; color: var(--navy); }
  .sb-brand .t { line-height: 1.2; }
  .sb-brand .t .n { font-weight: 700; font-size: 15px; letter-spacing: 0.03em; }
  .sb-brand .t .s { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.08em; }
  .sb-nav { flex: 1; padding: 14px 12px; display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
  .sb-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; padding: 10px 12px 6px; }
  .sb-item { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 9px; color: rgba(255,255,255,0.78); font-size: 13.5px; font-weight: 700; cursor: pointer; border: none; background: none; font-family: inherit; text-align: left; width: 100%; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .sb-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
  .sb-item.active { background: var(--accent); color: var(--ink); }
  .sb-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,0.10); display: flex; flex-direction: column; gap: 8px; }
  .sb-user { display: flex; align-items: center; gap: 11px; padding: 8px 6px; }
  .sb-user .av { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 14px; flex-shrink: 0; }
  .sb-user .u { line-height: 1.3; }
  .sb-user .u .un { font-size: 13px; font-weight: 700; }
  .sb-user .u .ur { font-size: 10.5px; color: rgba(255,255,255,0.55); }
  .sb-logout { display: flex; align-items: center; gap: 9px; font-family: inherit; font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.6); background: none; border: none; cursor: pointer; padding: 8px 10px; border-radius: 8px; width: 100%; transition: all 0.15s; }
  .sb-logout:hover { color: #ff8a7a; background: rgba(192,57,43,0.12); }

  /* ── Main ── */
  .main { padding: 26px 32px 48px; max-width: 1180px; }
  .topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 22px; gap: 16px; }
  .topbar h1 { font-size: 23px; font-weight: 900; }
  .topbar .sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .period { display: flex; gap: 4px; background: var(--white); border: 1.5px solid var(--line); border-radius: 10px; padding: 4px; }
  .period button { font-family: inherit; font-size: 12.5px; font-weight: 700; color: var(--muted); background: none; border: none; padding: 8px 15px; border-radius: 7px; cursor: pointer; transition: all 0.15s; }
  .period button:hover { color: var(--ink); }
  .period button.active { background: var(--accent); color: var(--ink); }
  .period button:disabled { cursor: not-allowed; opacity: 0.5; }

  /* ── KPI ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 26px; }
  .kpi { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; }
  .kpi .k-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .kpi .k-ic { width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; }
  .kpi .k-ic.c1 { background: rgba(26,58,107,0.10); color: var(--navy); }
  .kpi .k-ic.c2 { background: var(--accent); color: var(--ink); }
  .kpi .k-ic.c3 { background: rgba(192,57,43,0.10); color: var(--danger); }
  .kpi .k-ic.c4 { background: rgba(31,138,91,0.12); color: var(--ok); }
  .kpi .k-trend { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; background: rgba(31,138,91,0.10); color: var(--ok); display: flex; align-items: center; gap: 3px; }
  .kpi .k-trend.neg { background: rgba(192,57,43,0.10); color: var(--danger); }
  .kpi .k-val { font-size: 30px; font-weight: 900; line-height: 1; display: flex; align-items: baseline; gap: 4px; }
  .kpi .k-val .unit { font-size: 14px; font-weight: 700; color: var(--muted); }
  .kpi .k-label { font-size: 12.5px; color: var(--muted); font-weight: 700; margin-top: 9px; }

  /* skeleton */
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel { background: linear-gradient(90deg, #eee 25%, #f8f8f8 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 6px; }
  .kpi-skel { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; }
  .kpi-skel .ks-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  /* ── Panels ── */
  .panel { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
  .panel-head h2 { font-size: 15px; font-weight: 900; display: flex; align-items: center; gap: 9px; }
  .panel-head h2 .tick { width: 5px; height: 16px; background: var(--accent); border-radius: 2px; }
  .panel-head .ph-note { font-size: 11.5px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 11px; font-weight: 700; color: var(--muted); text-align: left; padding: 12px 22px; background: var(--field); letter-spacing: 0.02em; white-space: nowrap; }
  thead th.sortable { cursor: pointer; user-select: none; transition: color 0.15s; }
  thead th.sortable:hover { color: var(--ink); }
  thead th .th-in { display: inline-flex; align-items: center; gap: 5px; }
  thead th.num { text-align: right; }
  thead th .sort-ar { opacity: 0.35; transition: opacity 0.15s; }
  thead th.active-sort .sort-ar { opacity: 1; color: var(--navy); }
  thead th.active-sort { color: var(--ink); }
  tbody td { padding: 13px 22px; font-size: 13px; border-top: 1px solid var(--line); vertical-align: middle; }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--field); }
  .rank { width: 24px; height: 24px; border-radius: 6px; background: var(--field); border: 1px solid var(--line); color: var(--muted); font-size: 11px; font-weight: 900; display: inline-grid; place-items: center; margin-right: 10px; flex-shrink: 0; }
  .rank.top { background: var(--accent); border-color: var(--accent); color: var(--ink); }
  .a-title { font-weight: 700; max-width: 300px; line-height: 1.4; display: flex; align-items: center; }
  .a-title .at { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-tag { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
  /* cc-0..cc-7 カテゴリカラー（articles.html, home.html と同一） */
  .cc-0 { background: rgba(248,212,35,0.20); color: #7a6000; }
  .cc-1 { background: rgba(26,58,107,0.12); color: #1A3A6B; }
  .cc-2 { background: rgba(124,58,237,0.12); color: #6d28d9; }
  .cc-3 { background: rgba(31,138,91,0.12); color: #1F8A5B; }
  .cc-4 { background: rgba(192,57,43,0.12); color: #C0392B; }
  .cc-5 { background: rgba(229,80,57,0.12); color: #c0391b; }
  .cc-6 { background: rgba(8,145,178,0.12); color: #0891b2; }
  .cc-7 { background: rgba(109,40,217,0.12); color: #5b21b6; }
  .rate-cell { display: inline-flex; align-items: center; gap: 9px; justify-content: flex-end; width: 100%; }
  .rate-bar { width: 54px; height: 6px; background: var(--field); border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .rate-bar > div { height: 100%; background: var(--accent); border-radius: 99px; }
  .rate-val { font-weight: 900; min-width: 38px; text-align: right; }

  /* Two col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }

  /* PDF ranking bars */
  .rank-list { padding: 18px 22px; display: flex; flex-direction: column; gap: 16px; }
  .rank-item .ri-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ri-name { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; min-width: 0; flex: 1; }
  .ri-name .rn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ri-val { font-size: 13px; font-weight: 900; color: var(--navy); white-space: nowrap; margin-left: 12px; }
  .ri-val .u { font-size: 11px; color: var(--muted); font-weight: 700; }
  .ri-track { height: 12px; background: var(--field); border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .ri-fill { height: 100%; border-radius: 99px; background: var(--accent); width: 0; transition: width 1s cubic-bezier(.2,.7,.2,1); }
  .ri-fill.alt { background: var(--navy); }

  /* User progress */
  .u-cell { display: flex; align-items: center; gap: 11px; }
  .u-cell .av { width: 32px; height: 32px; border-radius: 50%; background: rgba(26,58,107,0.10); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 12px; flex-shrink: 0; }
  .u-cell .un { font-weight: 700; }
  .uprog { display: inline-flex; align-items: center; gap: 9px; justify-content: flex-end; width: 100%; }
  .uprog-bar { width: 60px; height: 6px; background: var(--field); border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .uprog-bar > div { height: 100%; background: var(--ok); border-radius: 99px; }
  .uprog-val { font-weight: 900; min-width: 38px; text-align: right; }
  .last-access { color: var(--muted); white-space: nowrap; }

  .empty { text-align: center; padding: 40px 22px; color: var(--muted); font-size: 13px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row td { text-align: center; padding: 32px; color: var(--muted); }
  .spin { width: 20px; height: 20px; border: 2.5px solid rgba(26,58,107,0.15); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ── GAS API エンドポイント ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

/* ── Icon ── */
function Icon({ children, size = 18 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
}

const NAV_ITEMS = [
  { key: "dash",     label: "ダッシュボード", href: "admin_dashboard.html",  icon: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></> },
  { key: "users",    label: "ユーザー管理",   href: "admin_users.html",      icon: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></> },
  { key: "articles", label: "記事管理",       href: "admin_articles.html",   icon: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></> },
  { key: "pdf",      label: "PDF管理",        href: "admin_pdfs.html",       icon: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></> },
  { key: "cat",      label: "カテゴリ管理",   href: "admin_categories.html", icon: <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></> },
  { key: "stats",    label: "統計",           href: "admin_stats.html",      icon: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></> },
];

/* ── データ正規化 ── */
function normalizeKpi(kpi) {
  if (!kpi) return {};
  return {
    views:       Number(kpi.views       || kpi.total_views    || 0),
    reads:       Number(kpi.reads       || kpi.total_reads    || 0),
    pdfDl:       Number(kpi.pdf_downloads || kpi.pdfDownloads || 0),
    activeUsers: Number(kpi.active_users  || kpi.activeUsers  || 0),
    viewsTrend:  kpi.views_trend  || kpi.viewsTrend  || '',
    readsTrend:  kpi.reads_trend  || kpi.readsTrend  || '',
    pdfTrend:    kpi.pdf_trend    || kpi.pdfTrend    || '',
    userTrend:   kpi.user_trend   || kpi.userTrend   || '',
  };
}

function normalizeArticle(a) {
  const views = Number(a.views || 0);
  const reads = Number(a.reads || a.read_count || 0);
  return {
    id:          a.id,
    title:       a.title || '（無題）',
    category_id: String(a.category_id || a.categoryId || ''),
    category_name: a.category_name || a.categoryName || '',
    views,
    reads,
    rate:        views > 0 ? Math.round(reads / views * 100) : 0,
    pdf:         Number(a.pdf_downloads || a.pdfDownloads || 0),
  };
}

function normalizePdfRank(p) {
  return {
    id:   p.id,
    name: p.name || p.title || '（無題）',
    dl:   Number(p.downloads || p.dl || p.download_count || 0),
  };
}

function normalizeUserProgress(u) {
  return {
    id:    u.id,
    name:  u.name || u.username || '',
    reads: Number(u.reads || u.read_count || 0),
    pct:   Number(u.progress_pct || u.pct || 0),
    last:  u.last_access || u.lastAccess || '',
  };
}

function getInitial(name) { return String(name || 'A').replace(/\s+/, '').charAt(0); }

function App() {
  /* ── 管理者認証ガード ── */
  const adminToken = localStorage.getItem('jz_admin_token');
  const adminUser  = (() => { try { return JSON.parse(localStorage.getItem('jz_admin_user') || '{}'); } catch { return {}; } })();
  if (!adminToken) { window.location.href = 'admin_login.html'; return null; }

  const [period,       setPeriod]      = useState('30');
  const [loading,      setLoading]     = useState(true);
  const [kpi,          setKpi]         = useState({});
  const [articles,     setArticles]    = useState([]);
  const [pdfRank,      setPdfRank]     = useState([]);
  const [userProgress, setUserProgress] = useState([]);
  const [catIndexMap,  setCatIndexMap] = useState({});
  const [sort,         setSort]        = useState({ key: 'views', dir: 'desc' });
  const [anim,         setAnim]        = useState(false);

  /* ── セッション切れチェック ── */
  function checkAuth(res) {
    if (res.success === false && /認証|token|auth/i.test(res.error || '')) {
      localStorage.removeItem('jz_admin_token');
      localStorage.removeItem('jz_admin_user');
      window.location.href = 'admin_login.html';
      return true;
    }
    return false;
  }

  /* ── 初回マウント: stats + categories を並列取得 ── */
  useEffect(() => {
    (async () => {
      setLoading(true);
      setAnim(false);
      try {
        const [sRes, cRes] = await Promise.all([
          gasPost({ action: 'adminGetStats', token: adminToken, period }),
          gasPost({ action: 'adminGetCategories', token: adminToken }),
        ]);
        if (checkAuth(sRes)) return;
        applyStats(sRes);
        if (cRes.success) {
          const m = {};
          (cRes.categories || []).forEach((c, i) => { m[String(c.id)] = i % 8; });
          setCatIndexMap(m);
        }
      } catch (e) {
        console.error('admin_stats init error:', e);
      } finally {
        setLoading(false);
        setTimeout(() => setAnim(true), 100);
      }
    })();
  }, []);

  /* ── 期間変更: stats のみ再取得 ── */
  useEffect(() => {
    // 初回は上の effect が対応するので skip
    if (loading) return;
    (async () => {
      setLoading(true);
      setAnim(false);
      try {
        const res = await gasPost({ action: 'adminGetStats', token: adminToken, period });
        if (checkAuth(res)) return;
        applyStats(res);
      } catch (e) {
        console.error('admin_stats period change error:', e);
      } finally {
        setLoading(false);
        setTimeout(() => setAnim(true), 100);
      }
    })();
  }, [period]);

  function applyStats(res) {
    if (!res.success) return;
    setKpi(normalizeKpi(res.kpi || {}));
    setArticles((res.articles     || []).map(normalizeArticle));
    setPdfRank( (res.pdf_rank     || res.pdfRank     || []).map(normalizePdfRank));
    setUserProgress((res.user_progress || res.userProgress || []).map(normalizeUserProgress));
  }

  /* ── カテゴリカラー ── */
  function catColorClass(category_id) {
    return 'cc-' + (catIndexMap[String(category_id)] ?? 0);
  }

  /* ── ログアウト ── */
  async function handleLogout() {
    try { await gasPost({ action: 'logout', token: adminToken }); } catch {}
    localStorage.removeItem('jz_admin_token');
    localStorage.removeItem('jz_admin_user');
    window.location.href = 'admin_login.html';
  }

  /* ── テーブルソート ── */
  const rows = useMemo(() => {
    const sorted = [...articles].sort((x, y) => {
      const d = sort.dir === 'desc' ? -1 : 1;
      if (sort.key === 'title') return x.title.localeCompare(y.title) * d;
      return (x[sort.key] - y[sort.key]) * d;
    });
    return sorted.slice(0, 10);
  }, [articles, sort]);

  function toggleSort(key) {
    setSort(s => s.key === key ? { key, dir: s.dir === 'desc' ? 'asc' : 'desc' } : { key, dir: 'desc' });
  }

  function SortHead({ k, label, num }) {
    const active = sort.key === k;
    return (
      <th className={'sortable' + (num ? ' num' : '') + (active ? ' active-sort' : '')} onClick={() => toggleSort(k)}>
        <span className="th-in">{label}
          <span className="sort-ar">
            {active && sort.dir === 'asc'
              ? <Icon size={12}><polyline points="18 15 12 9 6 15"/></Icon>
              : <Icon size={12}><polyline points="6 9 12 15 18 9"/></Icon>}
          </span>
        </span>
      </th>
    );
  }

  const maxDl = Math.max(1, ...pdfRank.map(p => p.dl));
  const adminName = adminUser.name || 'Admin';

  /* ── KPI スケルトン ── */
  const kpiDefs = [
    { ic: 'c1', label: '総閲覧数', unit: '回', trendKey: 'viewsTrend', valKey: 'views',
      icon: <><path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8z"/><circle cx="12" cy="12" r="3"/></> },
    { ic: 'c2', label: '総読了数', unit: '回', trendKey: 'readsTrend', valKey: 'reads',
      icon: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></> },
    { ic: 'c3', label: 'PDF総ダウンロード数', unit: '件', trendKey: 'pdfTrend', valKey: 'pdfDl',
      icon: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></> },
    { ic: 'c4', label: 'アクティブユーザー数', unit: '人', trendKey: 'userTrend', valKey: 'activeUsers',
      icon: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></> },
  ];

  return (
    <div className="shell">
      {/* ── サイドバー ── */}
      <aside className="sidebar">
        <div className="sb-brand">
          <div className="mark"><span>ジ</span></div>
          <div className="t">
            <div className="n">ジブンゼミ</div>
            <div className="s">ADMIN PANEL</div>
          </div>
        </div>
        <nav className="sb-nav">
          <div className="sb-label">メニュー</div>
          {NAV_ITEMS.map(n => (
            <a key={n.key} href={n.href}
               className={'sb-item' + (n.key === 'stats' ? ' active' : '')}>
              <Icon>{n.icon}</Icon>
              {n.label}
            </a>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-user">
            <div className="av">{getInitial(adminName)}</div>
            <div className="u">
              <div className="un">{adminName}</div>
              <div className="ur">管理者</div>
            </div>
          </div>
          <button className="sb-logout" onClick={handleLogout}>
            <Icon size={14}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>
            ログアウト
          </button>
        </div>
      </aside>

      {/* ── メイン ── */}
      <main className="main">
        <div className="topbar">
          <div>
            <h1>統計・分析</h1>
            <div className="sub">コンテンツの人気度とユーザーの学習状況を把握できます</div>
          </div>
          <div className="period">
            {[['7','直近7日'],['30','直近30日'],['all','全期間']].map(([k, l]) => (
              <button key={k} className={period === k ? 'active' : ''} onClick={() => setPeriod(k)} disabled={loading}>{l}</button>
            ))}
          </div>
        </div>

        {/* ── KPI ── */}
        <div className="kpi-grid">
          {loading ? (
            kpiDefs.map((d, i) => (
              <div key={i} className="kpi-skel">
                <div className="ks-top">
                  <div className="skel" style={{width:40,height:40,borderRadius:10}}></div>
                  <div className="skel" style={{width:54,height:22,borderRadius:99}}></div>
                </div>
                <div className="skel" style={{width:120,height:30,marginBottom:10}}></div>
                <div className="skel" style={{width:80,height:14}}></div>
              </div>
            ))
          ) : (
            kpiDefs.map(d => {
              const trend = kpi[d.trendKey] || '';
              const isNeg = trend.startsWith('-') || trend.startsWith('－');
              return (
                <div key={d.valKey} className="kpi">
                  <div className="k-top">
                    <div className={'k-ic ' + d.ic}><Icon>{d.icon}</Icon></div>
                    {trend && <span className={'k-trend' + (isNeg ? ' neg' : '')}>{trend}</span>}
                  </div>
                  <div className="k-val">{(kpi[d.valKey] || 0).toLocaleString()}<span className="unit">{d.unit}</span></div>
                  <div className="k-label">{d.label}</div>
                </div>
              );
            })
          )}
        </div>

        {/* ── 記事別パフォーマンス ── */}
        <div className="panel">
          <div className="panel-head">
            <h2><span className="tick"></span>記事別パフォーマンス</h2>
            <span className="ph-note">上位10件・列見出しクリックで並び替え</span>
          </div>
          <table>
            <thead>
              <tr>
                <SortHead k="title" label="記事タイトル" />
                <th>カテゴリ</th>
                <SortHead k="views" label="閲覧数" num />
                <SortHead k="reads" label="読了数" num />
                <SortHead k="rate" label="読了率" num />
                <SortHead k="pdf" label="PDF DL数" num />
              </tr>
            </thead>
            <tbody>
              {loading ? (
                <tr className="loading-row"><td colSpan={6}><span className="spin"></span></td></tr>
              ) : rows.length === 0 ? (
                <tr><td colSpan={6} className="empty">データがありません</td></tr>
              ) : (
                rows.map((a, i) => (
                  <tr key={a.id || i}>
                    <td>
                      <div className="a-title">
                        <span className={'rank' + (i < 3 ? ' top' : '')}>{i + 1}</span>
                        <span className="at">{a.title}</span>
                      </div>
                    </td>
                    <td>
                      {a.category_name
                        ? <span className={'cat-tag ' + catColorClass(a.category_id)}>{a.category_name}</span>
                        : <span style={{color:'var(--muted)',fontSize:'12px'}}>—</span>
                      }
                    </td>
                    <td className="num">{a.views.toLocaleString()}</td>
                    <td className="num">{a.reads.toLocaleString()}</td>
                    <td className="num">
                      <span className="rate-cell">
                        <span className="rate-bar"><div style={{ width: a.rate + '%' }}></div></span>
                        <span className="rate-val">{a.rate}%</span>
                      </span>
                    </td>
                    <td className="num">{a.pdf}</td>
                  </tr>
                ))
              )}
            </tbody>
          </table>
        </div>

        <div className="two-col">
          {/* ── PDF ランキング ── */}
          <div className="panel" style={{marginBottom:0}}>
            <div className="panel-head">
              <h2><span className="tick"></span>PDFダウンロード数 ランキング</h2>
              <span className="ph-note">上位5件</span>
            </div>
            {loading ? (
              <div className="rank-list">
                {Array.from({length:5}).map((_,i)=>(
                  <div key={i} className="rank-item">
                    <div className="ri-top"><div className="skel" style={{height:14,width:'70%'}}></div><div className="skel" style={{height:14,width:40}}></div></div>
                    <div className="skel" style={{height:12,borderRadius:99}}></div>
                  </div>
                ))}
              </div>
            ) : pdfRank.length === 0 ? (
              <div className="empty">データがありません</div>
            ) : (
              <div className="rank-list">
                {pdfRank.slice(0,5).map((p, i) => (
                  <div className="rank-item" key={p.id || i}>
                    <div className="ri-top">
                      <div className="ri-name">
                        <span className={'rank' + (i < 3 ? ' top' : '')}>{i + 1}</span>
                        <span className="rn">{p.name}</span>
                      </div>
                      <div className="ri-val">{p.dl}<span className="u"> 件</span></div>
                    </div>
                    <div className="ri-track">
                      <div className={'ri-fill' + (i % 2 ? ' alt' : '')}
                           style={{ width: (anim ? (p.dl / maxDl * 100) : 0) + '%' }}></div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ── ユーザー別進捗 ── */}
          <div className="panel" style={{marginBottom:0}}>
            <div className="panel-head">
              <h2><span className="tick"></span>ユーザー別進捗</h2>
              <span className="ph-note">上位6名</span>
            </div>
            <table>
              <thead>
                <tr><th>氏名</th><th className="num">読了数</th><th className="num">進捗率</th><th>最終アクセス</th></tr>
              </thead>
              <tbody>
                {loading ? (
                  <tr className="loading-row"><td colSpan={4}><span className="spin"></span></td></tr>
                ) : userProgress.length === 0 ? (
                  <tr><td colSpan={4} className="empty">データがありません</td></tr>
                ) : (
                  userProgress.slice(0,6).map((u, i) => (
                    <tr key={u.id || i}>
                      <td>
                        <div className="u-cell">
                          <div className="av">{getInitial(u.name)}</div>
                          <span className="un">{u.name}</span>
                        </div>
                      </td>
                      <td className="num">{u.reads}<span style={{color:'var(--muted)',fontSize:'11px'}}> 件</span></td>
                      <td className="num">
                        <span className="uprog">
                          <span className="uprog-bar"><div style={{ width: u.pct + '%' }}></div></span>
                          <span className="uprog-val">{u.pct}%</span>
                        </span>
                      </td>
                      <td><span className="last-access">{u.last || '—'}</span></td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
