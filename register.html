<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜新規登録</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5;
    --accent: #F8D423;
    --accent-press: #E8C40F;
    --navy: #1A3A6B;
    --ink: #1F1F1F;
    --white: #FFFFFF;
    --muted: #6B6B70;
    --line: #E4E4E7;
    --field: #FAFAFA;
    --radius: 12px;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --danger: #C0392B;
    --ok: #1F8A5B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100%; }

  /* ── Top brand bar ── */
  .topbar {
    height: 56px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .brand-mark span { font-weight: 900; font-size: 15px; color: var(--navy); line-height: 1; }
  .topbar .brand-name { color: var(--white); font-weight: 700; font-size: 16px; letter-spacing: 0.04em; }
  .topbar .login-link {
    color: rgba(255,255,255,0.85);
    font-size: 12.5px; font-weight: 700; text-decoration: none;
    display: flex; align-items: center; gap: 5px;
    transition: color 0.15s;
  }
  .topbar .login-link:hover { color: var(--white); }

  /* ── Layout ── */
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 64px;
  }

  .head {
    text-align: center;
    margin-bottom: 26px;
  }
  .head h1 {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .head p { font-size: 13px; color: var(--muted); }

  /* ── Stepper ── */
  .stepper {
    display: flex;
    align-items: flex-start;
    width: 100%;
    max-width: 460px;
    margin: 0 auto 26px;
  }
  .step-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .step-bubble {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--white);
    border: 2px solid var(--line);
    display: grid; place-items: center;
    font-size: 14px; font-weight: 900;
    color: var(--muted);
    z-index: 2;
    transition: all 0.3s;
  }
  .step-item.active .step-bubble {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
    box-shadow: 0 3px 10px rgba(248,212,35,0.4);
  }
  .step-item.done .step-bubble {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  .step-label {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--muted);
    margin-top: 8px;
    text-align: center;
    transition: color 0.3s;
  }
  .step-item.active .step-label, .step-item.done .step-label { color: var(--ink); }
  .step-line {
    position: absolute;
    top: 17px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: var(--line);
    z-index: 1;
  }
  .step-item.done .step-line { background: var(--navy); }
  .step-item:last-child .step-line { display: none; }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px 30px 32px;
  }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 22px; }

  .fade { animation: fade 0.35s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Method cards (STEP1) ── */
  .method-list { display: flex; flex-direction: column; gap: 14px; }
  .method {
    display: flex;
    align-items: center;
    gap: 16px;
    text-align: left;
    width: 100%;
    background: var(--field);
    border: 1.5px solid var(--line);
    border-radius: 11px;
    padding: 18px 18px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.18s, background 0.18s, transform 0.08s, box-shadow 0.18s;
  }
  .method:hover {
    border-color: var(--accent);
    background: var(--white);
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .method:active { transform: translateY(1px); }
  .method .m-icon {
    width: 46px; height: 46px;
    border-radius: 11px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .method.phone .m-icon { background: rgba(248,212,35,0.22); color: #9a7d00; }
  .method.note .m-icon { background: rgba(26,58,107,0.10); color: var(--navy); }
  .method .m-body { flex: 1; }
  .method .m-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .method .m-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .method .m-arrow { color: var(--muted); flex-shrink: 0; transition: transform 0.18s, color 0.18s; }
  .method:hover .m-arrow { transform: translateX(3px); color: var(--ink); }

  /* ── Fields ── */
  .selected-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--field);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 22px;
    font-size: 12.5px;
  }
  .selected-bar .sb-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: grid; place-items: center; flex-shrink: 0;
    background: rgba(248,212,35,0.22); color: #9a7d00;
  }
  .selected-bar.note .sb-icon { background: rgba(26,58,107,0.10); color: var(--navy); }
  .selected-bar .sb-label { color: var(--muted); }
  .selected-bar .sb-name { font-weight: 700; color: var(--ink); }
  .selected-bar .sb-change {
    margin-left: auto;
    color: var(--navy); font-weight: 700; font-size: 12px;
    background: none; border: none; cursor: pointer; font-family: inherit;
    padding: 4px 6px; border-radius: 6px;
    transition: background 0.15s;
  }
  .selected-bar .sb-change:hover { background: var(--bg); }

  .field { margin-bottom: 16px; }
  .field label {
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 700; margin-bottom: 7px; color: var(--ink);
  }
  .req {
    font-size: 10px; font-weight: 700; color: var(--danger);
    background: rgba(192,57,43,0.10);
    padding: 1px 6px; border-radius: 4px;
  }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap.with-prefix .prefix {
    position: absolute; left: 13px; font-size: 14px; color: var(--muted);
    pointer-events: none; font-weight: 500;
  }
  input[type="text"], input[type="tel"], input[type="password"] {
    width: 100%; font-family: inherit; font-size: 14.5px; color: var(--ink);
    background: var(--field); border: 1.5px solid var(--line);
    border-radius: 9px; padding: 12px 14px;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .input-wrap.with-prefix input { padding-left: 40px; }
  .input-wrap.with-toggle input { padding-right: 46px; }
  input::placeholder { color: #B6B6BC; }
  input:focus {
    outline: none; border-color: var(--accent); background: var(--white);
    box-shadow: 0 0 0 3px rgba(248,212,35,0.22);
  }
  input.invalid { border-color: var(--danger); background: #FDF3F2; }
  input.invalid:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.16); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .toggle-pw {
    position: absolute; right: 6px; border: none; background: transparent;
    cursor: pointer; padding: 8px; border-radius: 7px; color: var(--muted);
    display: grid; place-items: center; transition: color 0.15s, background 0.15s;
  }
  .toggle-pw:hover { color: var(--ink); background: var(--bg); }

  .error-msg {
    font-size: 11.5px; color: var(--danger); margin-top: 6px; font-weight: 500;
    display: flex; align-items: center; gap: 4px;
  }

  /* ── API Error banner ── */
  .api-error {
    background: #FDF3F2;
    border: 1.5px solid #FECACA;
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--danger);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .api-error svg { flex-shrink: 0; }

  /* ── Buttons ── */
  .actions { display: flex; gap: 12px; margin-top: 24px; }
  .btn {
    font-family: inherit; font-size: 14.5px; font-weight: 900;
    border-radius: 10px; padding: 14px; cursor: pointer;
    letter-spacing: 0.04em; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.16s, transform 0.08s, box-shadow 0.16s, border-color 0.16s;
  }
  .btn-primary {
    flex: 1; color: var(--ink); background: var(--accent);
    box-shadow: 0 3px 10px rgba(248,212,35,0.35);
  }
  .btn-primary:hover { background: var(--accent-press); box-shadow: 0 5px 14px rgba(248,212,35,0.45); }
  .btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(248,212,35,0.35); }
  .btn-primary:disabled { background: #ECECEE; color: #B6B6BC; cursor: not-allowed; box-shadow: none; }
  .btn-ghost {
    color: var(--ink); background: var(--white); border: 1.5px solid var(--line);
    padding-left: 22px; padding-right: 22px;
  }
  .btn-ghost:hover { border-color: var(--muted); background: var(--bg); }

  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid rgba(31,31,31,0.25);
    border-top-color: var(--ink); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STEP3 done ── */
  .done-wrap { text-align: center; padding: 12px 4px 6px; }
  .done-badge {
    width: 76px; height: 76px; border-radius: 50%;
    background: rgba(31,138,91,0.12);
    display: grid; place-items: center; margin: 0 auto 20px;
  }
  .done-badge .ring {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--ok); display: grid; place-items: center;
  }
  .done-wrap h2 { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
  .done-wrap .done-msg {
    font-size: 13.5px; color: var(--muted); line-height: 1.75; margin-bottom: 22px;
  }
  .done-note {
    background: var(--field);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: left;
    display: flex; gap: 11px;
    font-size: 12.5px; color: var(--ink); line-height: 1.65;
    margin-bottom: 24px;
  }
  .done-note .n-icon {
    color: var(--navy); flex-shrink: 0; margin-top: 1px;
  }
  .done-summary {
    display: flex; flex-direction: column; gap: 1px;
    border: 1.5px solid var(--line); border-radius: 10px;
    overflow: hidden; margin-bottom: 24px; text-align: left;
  }
  .done-summary .row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 15px; background: var(--white); font-size: 12.5px;
  }
  .done-summary .row + .row { border-top: 1px solid var(--line); }
  .done-summary .row .k { color: var(--muted); font-weight: 500; }
  .done-summary .row .v { font-weight: 700; }

  .foot { margin-top: 28px; font-size: 11px; color: #A0A0A6; text-align: center; letter-spacing: 0.02em; }

  @media (max-width: 480px) {
    .page { padding: 30px 16px 52px; }
    .card { padding: 24px 20px 26px; }
    .head h1 { font-size: 21px; }
    .step-label { font-size: 10.5px; }
    .actions { flex-direction: column-reverse; }
    .btn-ghost { width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

/* ── GAS API エンドポイント ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

function EyeIcon({ off }) {
  return off ? (
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
      <path d="M1 1l22 22"/>
      <path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 8 10 8a9.7 9.7 0 0 0 5.39-1.61"/>
    </svg>
  ) : (
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8z"/><circle cx="12" cy="12" r="3"/>
    </svg>
  );
}
function WarnIcon() {
  return (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  );
}
function PhoneIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="6" y="2" width="12" height="20" rx="2.5"/><line x1="10" y1="18" x2="14" y2="18"/>
    </svg>
  );
}
function NoteIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/>
    </svg>
  );
}
function ArrowIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
    </svg>
  );
}

const STEPS = [
  { id: 1, label: "方式選択" },
  { id: 2, label: "情報入力" },
  { id: 3, label: "申請完了" },
];

function Stepper({ step }) {
  return (
    <div className="stepper">
      {STEPS.map(s => {
        const state = step > s.id ? "done" : step === s.id ? "active" : "";
        return (
          <div className={"step-item " + state} key={s.id}>
            <div className="step-line"></div>
            <div className="step-bubble">
              {step > s.id
                ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                : s.id}
            </div>
            <div className="step-label">STEP{s.id}<br/>{s.label}</div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [method, setMethod] = useState(null); // 'phone' | 'note'
  const [showPw, setShowPw] = useState(false);
  const [vals, setVals] = useState({ name: "", phone: "", note: "", pw: "" });
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState(false);
  const [loading, setLoading] = useState(false);
  const [apiError, setApiError] = useState('');

  function update(key, v) {
    setVals(s => ({ ...s, [key]: v }));
    if (touched) setErrors(validate({ ...vals, [key]: v }));
  }

  function validate(v) {
    const e = {};
    if (!v.name.trim()) e.name = "氏名を入力してください";
    if (method === "phone") {
      const digits = v.phone.replace(/[-\s]/g, "");
      if (!digits) e.phone = "電話番号を入力してください";
      else if (!/^0\d{9,10}$/.test(digits)) e.phone = "正しい電話番号を入力してください";
    } else {
      if (!v.note.trim()) e.note = "noteユーザーIDを入力してください";
    }
    if (!v.pw) e.pw = "パスワードを入力してください";
    else if (v.pw.length < 8) e.pw = "パスワードは8文字以上で設定してください";
    return e;
  }

  function pickMethod(m) {
    setMethod(m);
    setErrors({});
    setTouched(false);
    setApiError('');
    setStep(2);
  }

  function backToStep1() {
    setStep(1);
    setMethod(null);
    setApiError('');
  }

  async function submit(ev) {
    ev.preventDefault();
    setTouched(true);
    setApiError('');
    const e = validate(vals);
    setErrors(e);
    if (Object.keys(e).length > 0) return;

    setLoading(true);
    try {
      /* ── ここが修正箇所 ── */
      const resp = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'register',
          name: vals.name.trim(),
          phone: method === 'phone' ? vals.phone.replace(/[-\s]/g, '') : '',
          note_id: method === 'note' ? vals.note.trim() : '',
          password: vals.pw
        })
      });

      const data = await resp.json();

      if (data.success) {
        setStep(3);
      } else {
        setApiError(data.error || '登録に失敗しました');
      }
    } catch (err) {
      setApiError('通信エラーが発生しました。しばらく待ってから再試行してください。');
    } finally {
      setLoading(false);
    }
  }

  function goLogin() {
    window.location.href = 'login.html';
  }

  return (
    <React.Fragment>
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark"><span>ジ</span></div>
          <div className="brand-name">ジブンゼミ</div>
        </div>
        <a className="login-link" href="login.html">
          ログイン
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
        </a>
      </header>

      <main className="page">
        <div className="head">
          <h1>新規会員登録</h1>
          <p>ジブンゼミ サブスク会員（月額500円）への登録申請</p>
        </div>

        <Stepper step={step} />

        {step === 1 && (
          <div className="card fade" key="s1">
            <div className="card-title">登録方式を選択</div>
            <div className="card-sub">ご利用になるログイン方式を選んでください</div>
            <div className="method-list">
              <button type="button" className="method phone" onClick={() => pickMethod("phone")}>
                <div className="m-icon"><PhoneIcon /></div>
                <div className="m-body">
                  <div className="m-title">電話番号で登録</div>
                  <div className="m-desc">お持ちの携帯電話番号で登録します</div>
                </div>
                <div className="m-arrow"><ArrowIcon /></div>
              </button>
              <button type="button" className="method note" onClick={() => pickMethod("note")}>
                <div className="m-icon"><NoteIcon /></div>
                <div className="m-body">
                  <div className="m-title">noteアカウントで登録</div>
                  <div className="m-desc">noteのユーザーIDで登録します</div>
                </div>
                <div className="m-arrow"><ArrowIcon /></div>
              </button>
            </div>
          </div>
        )}

        {step === 2 && (
          <form className="card fade" key="s2" onSubmit={submit} noValidate>
            <div className="card-title">会員情報の入力</div>
            <div className="card-sub">登録に必要な情報を入力してください</div>

            <div className={"selected-bar " + (method === "note" ? "note" : "")}>
              <div className="sb-icon">{method === "phone" ? <PhoneIcon /> : <NoteIcon />}</div>
              <span className="sb-label">登録方式：</span>
              <span className="sb-name">{method === "phone" ? "電話番号" : "noteアカウント"}</span>
              <button type="button" className="sb-change" onClick={backToStep1}>変更</button>
            </div>

            {/* API エラー表示 */}
            {apiError && (
              <div className="api-error">
                <WarnIcon />
                {apiError}
              </div>
            )}

            <div className="field">
              <label htmlFor="name">氏名 <span className="req">必須</span></label>
              <div className="input-wrap">
                <input id="name" type="text" autoComplete="name" placeholder="山田 太郎"
                  value={vals.name} onChange={e => update("name", e.target.value)}
                  className={errors.name ? "invalid" : ""} />
              </div>
              {errors.name && <div className="error-msg"><WarnIcon />{errors.name}</div>}
            </div>

            {method === "phone" ? (
              <div className="field">
                <label htmlFor="phone">電話番号 <span className="req">必須</span></label>
                <div className="input-wrap">
                  <input id="phone" type="tel" inputMode="numeric" autoComplete="tel" placeholder="09012345678"
                    value={vals.phone} onChange={e => update("phone", e.target.value)}
                    className={errors.phone ? "invalid" : ""} />
                </div>
                {errors.phone
                  ? <div className="error-msg"><WarnIcon />{errors.phone}</div>
                  : <div className="hint">ハイフンなしで入力してください</div>}
              </div>
            ) : (
              <div className="field">
                <label htmlFor="note">note ユーザーID <span className="req">必須</span></label>
                <div className="input-wrap with-prefix">
                  <span className="prefix">@</span>
                  <input id="note" type="text" autoComplete="username" placeholder="jibun_taro"
                    value={vals.note} onChange={e => update("note", e.target.value)}
                    className={errors.note ? "invalid" : ""} />
                </div>
                {errors.note
                  ? <div className="error-msg"><WarnIcon />{errors.note}</div>
                  : <div className="hint">noteのプロフィールURL末尾のIDです</div>}
              </div>
            )}

            <div className="field">
              <label htmlFor="pw">パスワード <span className="req">必須</span></label>
              <div className="input-wrap with-toggle">
                <input id="pw" type={showPw ? "text" : "password"} autoComplete="new-password" placeholder="8文字以上で設定"
                  value={vals.pw} onChange={e => update("pw", e.target.value)}
                  className={errors.pw ? "invalid" : ""} />
                <button type="button" className="toggle-pw" aria-label="パスワードの表示切替" onClick={() => setShowPw(s => !s)}>
                  <EyeIcon off={showPw} />
                </button>
              </div>
              {errors.pw
                ? <div className="error-msg"><WarnIcon />{errors.pw}</div>
                : <div className="hint">半角英数字8文字以上で設定してください</div>}
            </div>

            <div className="actions">
              <button type="button" className="btn btn-ghost" onClick={backToStep1}>戻る</button>
              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? <React.Fragment><span className="spinner"></span>申請中…</React.Fragment> : "申請する"}
              </button>
            </div>
          </form>
        )}

        {step === 3 && (
          <div className="card fade" key="s3">
            <div className="done-wrap">
              <div className="done-badge">
                <div className="ring">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
              </div>
              <h2>申請を受け付けました</h2>
              <div className="done-msg">
                ご登録ありがとうございます。<br/>
                管理者が承認後にログイン可能になります。
              </div>

              <div className="done-summary">
                <div className="row"><span className="k">氏名</span><span className="v">{vals.name || "—"}</span></div>
                <div className="row">
                  <span className="k">{method === "phone" ? "電話番号" : "note ID"}</span>
                  <span className="v">{method === "phone" ? (vals.phone || "—") : ("@" + (vals.note || "—"))}</span>
                </div>
                <div className="row"><span className="k">ステータス</span><span className="v" style={{color:"#9a7d00"}}>承認待ち</span></div>
              </div>

              <div className="done-note">
                <span className="n-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                </span>
                <span>承認が完了するとご登録の連絡先に通知されます。通常 1〜2 営業日以内にご案内します。</span>
              </div>

              <button type="button" className="btn btn-primary" style={{width:"100%"}} onClick={goLogin}>
                ログイン画面へ
              </button>
            </div>
          </div>
        )}

        <div className="foot">© 2026 ジブンゼミ　月額500円のキャリア支援サブスク</div>
      </main>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
