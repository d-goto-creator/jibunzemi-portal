<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜マイページ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5;
    --accent: #F8D423;
    --accent-press: #E8C40F;
    --navy: #1A3A6B;
    --ink: #1F1F1F;
    --white: #FFFFFF;
    --muted: #6B6B70;
    --line: #E4E4E7;
    --field: #FAFAFA;
    --radius: 12px;
    --shadow: 0 4px 16px rgba(0,0,0,0.12);
    --ok: #1F8A5B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  #root { min-height: 100%; }
  a { color: inherit; }

  /* ── Nav ── */
  .nav {
    height: 60px; background: var(--navy);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; position: sticky; top: 0; z-index: 30;
  }
  .nav .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .brand-mark span { font-weight: 900; font-size: 16px; color: var(--navy); line-height: 1; }
  .nav .brand-name { color: var(--white); font-weight: 700; font-size: 17px; letter-spacing: 0.04em; }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .nav-link {
    color: rgba(255,255,255,0.82); font-size: 13px; font-weight: 700; text-decoration: none;
    padding: 8px 13px; border-radius: 8px; display: flex; align-items: center; gap: 7px;
    transition: color 0.15s, background 0.15s;
    cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.10); }
  .nav-link.active { color: var(--white); background: rgba(255,255,255,0.13); }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 13px; margin-left: 4px; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 24px 64px; }
  .page-head { margin-bottom: 22px; }
  .page-head h1 { font-size: 26px; font-weight: 900; letter-spacing: 0.02em; }
  .page-head p { font-size: 13.5px; color: var(--muted); margin-top: 6px; }

  /* ── Top grid ── */
  .top-grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; margin-bottom: 30px; align-items: start; }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }

  /* Profile */
  .profile { padding: 26px 24px; }
  .profile .avatar {
    width: 72px; height: 72px; border-radius: 50%; background: var(--accent); color: var(--navy);
    display: grid; place-items: center; font-weight: 900; font-size: 28px; margin: 0 auto 16px;
    box-shadow: 0 4px 12px rgba(248,212,35,0.45);
  }
  .profile .name { text-align: center; font-size: 19px; font-weight: 900; margin-bottom: 4px; }
  .profile .uid { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .info-rows { display: flex; flex-direction: column; gap: 1px; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 18px; }
  .info-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: var(--white); font-size: 12.5px; }
  .info-row + .info-row { border-top: 1px solid var(--line); }
  .info-row .k { color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .info-row .v { font-weight: 700; }
  .method-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; background: rgba(26,58,107,0.08); color: var(--navy); padding: 3px 10px; border-radius: 99px; }
  .sub-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 900; background: var(--ok); color: var(--white); padding: 4px 11px; border-radius: 99px; }
  .sub-badge .pulse { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.9); }
  .btn-settings {
    width: 100%; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink);
    background: var(--white); border: 1.5px solid var(--line); border-radius: 10px; padding: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.16s; text-decoration: none;
  }
  .btn-settings:hover { border-color: var(--navy); background: var(--field); color: var(--navy); }

  /* Progress */
  .progress { padding: 24px 26px; }
  .progress-head { display: flex; align-items: center; gap: 9px; margin-bottom: 20px; }
  .progress-head h2 { font-size: 16px; font-weight: 900; display: flex; align-items: center; gap: 9px; }
  .progress-head .tick { width: 5px; height: 17px; background: var(--accent); border-radius: 2px; }
  .progress-body { display: grid; grid-template-columns: 168px 1fr; gap: 28px; align-items: center; }
  .donut-wrap { text-align: center; }
  .donut { position: relative; width: 150px; height: 150px; margin: 0 auto; }
  .donut svg { transform: rotate(-90deg); }
  .donut .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .donut .center .pct { font-size: 32px; font-weight: 900; line-height: 1; }
  .donut .center .lbl { font-size: 10.5px; color: var(--muted); font-weight: 700; margin-top: 3px; }
  .donut-cap { font-size: 12px; color: var(--muted); margin-top: 12px; }
  .donut-cap b { color: var(--ink); font-weight: 900; }
  .bars { display: flex; flex-direction: column; gap: 14px; }
  .bar-item .bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .bar-item .bar-name { font-size: 12.5px; font-weight: 700; }
  .bar-item .bar-val { font-size: 11.5px; color: var(--muted); }
  .bar-item .bar-val b { color: var(--ink); font-weight: 900; font-size: 13px; }
  .bar-track { height: 9px; background: var(--field); border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; width: 0; transition: width 1s cubic-bezier(.2,.7,.2,1); }

  /* ── Section ── */
  .section { margin-bottom: 30px; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-head h2 { font-size: 17px; font-weight: 900; display: flex; align-items: center; gap: 9px; }
  .sec-head h2 .tick { width: 5px; height: 18px; background: var(--accent); border-radius: 2px; }
  .sec-head h2 .cnt { font-size: 12px; font-weight: 700; color: var(--muted); background: var(--white); border: 1.5px solid var(--line); padding: 2px 9px; border-radius: 99px; }
  .sec-more { font-size: 12.5px; font-weight: 700; color: var(--navy); text-decoration: none; padding: 4px 6px; border-radius: 6px; transition: background 0.15s; }
  .sec-more:hover { background: rgba(26,58,107,0.07); }

  /* History list */
  .hist-list { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .hist-row {
    display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer;
    transition: background 0.14s; text-decoration: none; color: inherit;
  }
  .hist-row + .hist-row { border-top: 1px solid var(--line); }
  .hist-row:hover { background: var(--field); }
  .hist-thumb { width: 52px; height: 40px; border-radius: 7px; overflow: hidden; flex-shrink: 0; position: relative; background: var(--field); }
  .hist-thumb .ph-stripes { position: absolute; inset: 0; opacity: 0.55; }
  .hist-body { flex: 1; min-width: 0; }
  .hist-body .h-cat { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; margin-right: 8px; }
  .hist-body h3 { font-size: 13.5px; font-weight: 700; display: inline; }
  .hist-body .h-meta { font-size: 11px; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 8px; }
  .hist-arrow { color: var(--line); flex-shrink: 0; transition: color 0.15s, transform 0.15s; }
  .hist-row:hover .hist-arrow { color: var(--muted); transform: translateX(2px); }
  .read-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .read-dot.done { background: var(--accent); }
  .read-dot.unread { background: var(--line); }

  /* Two-col bottom */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Saved cards */
  .saved-list { display: flex; flex-direction: column; gap: 12px; }
  .saved-card {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; display: flex; gap: 13px; align-items: center; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.16s; border: 1.5px solid transparent;
    text-decoration: none; color: inherit;
  }
  .saved-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.12); border-color: rgba(248,212,35,0.55); }
  .saved-thumb { width: 60px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; position: relative; background: var(--field); }
  .saved-thumb .ph-stripes { position: absolute; inset: 0; opacity: 0.55; }
  .saved-body { flex: 1; min-width: 0; }
  .saved-body .s-cat { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
  .saved-body h3 { font-size: 13px; font-weight: 700; line-height: 1.45; margin-top: 7px; text-wrap: pretty; }
  .bookmark { color: var(--accent); flex-shrink: 0; }

  /* PDF list */
  .pdf-list { display: flex; flex-direction: column; gap: 12px; }
  .pdf-row { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; display: flex; gap: 13px; align-items: center; }
  .pdf-ic { width: 38px; height: 46px; border-radius: 7px; flex-shrink: 0; background: rgba(192,57,43,0.10); color: #C0392B; border: 1.5px solid rgba(192,57,43,0.2); display: grid; place-items: center; position: relative; }
  .pdf-ic .ext { position: absolute; bottom: 4px; font-size: 7px; font-weight: 900; }
  .pdf-info { flex: 1; min-width: 0; }
  .pdf-info h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .pdf-info .p-meta { font-size: 11px; color: var(--muted); }
  .btn-redl {
    font-family: inherit; font-size: 12px; font-weight: 700; color: var(--ink);
    background: var(--white); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 13px;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .btn-redl:hover { border-color: var(--navy); color: var(--navy); background: var(--field); }

  /* Category color palette */
  .cc-0 { background: rgba(248,212,35,0.22); color: #8a7000; }
  .cc-1 { background: rgba(26,58,107,0.10);  color: var(--navy); }
  .cc-2 { background: rgba(107,70,193,0.12); color: #5a37b0; }
  .cc-3 { background: rgba(31,138,91,0.12);  color: var(--ok); }
  .cc-4 { background: rgba(176,84,43,0.12);  color: #9c4a25; }
  .cc-5 { background: rgba(220,53,69,0.10);  color: #b02a37; }
  .cc-6 { background: rgba(13,202,240,0.12); color: #0a7280; }
  .cc-7 { background: rgba(102,16,242,0.10); color: #5b0fa8; }

  /* Bar colors by category index */
  .bar-colors { display: none; }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--line) 25%, #f0f0f2 50%, var(--line) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .sk-block { border-radius: var(--radius); }

  .empty-msg { font-size: 13px; color: var(--muted); text-align: center; padding: 24px 16px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }

  .foot { margin-top: 34px; font-size: 11px; color: #A0A0A6; text-align: center; letter-spacing: 0.02em; }

  @media (max-width: 880px) {
    .top-grid { grid-template-columns: 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
    .progress-body { grid-template-columns: 1fr; gap: 22px; }
  }
  @media (max-width: 620px) {
    .nav { padding: 0 16px; }
    .nav-right .nav-link span.txt { display: none; }
    .nav-link { padding: 8px; }
    .wrap { padding: 22px 16px 52px; }
    .page-head h1 { font-size: 22px; }
    .hist-body h3 { display: block; margin-top: 5px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ── GAS API エンドポイント ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

/* ── 日付フォーマット ── */
function fmtTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  const now = new Date();
  const isThisYear = d.getFullYear() === now.getFullYear();
  const pad = n => String(n).padStart(2, '0');
  return isThisYear
    ? `${d.getMonth()+1}月${d.getDate()}日 ${pad(d.getHours())}:${pad(d.getMinutes())}`
    : `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

/* ── バーチャート色 (index mod 8) ── */
const BAR_COLORS = ['#F8D423','#1A3A6B','#7c3aed','#1F8A5B','#c0392b','#e55039','#0891b2','#7c3aed'];

/* ── SVG Stripes (安定 ID) ── */
function Stripes({ seed }) {
  const id = "ms" + seed;
  return (
    <svg className="ph-stripes" width="100%" height="100%" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <pattern id={id} width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
          <rect width="10" height="10" fill="#FAFAFA"/>
          <line x1="0" y1="0" x2="0" y2="10" stroke="#E4E4E7" strokeWidth="5"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill={"url(#" + id + ")"}/>
    </svg>
  );
}

/* ── Donut ── */
function Donut({ pct }) {
  const r = 62, c = 2 * Math.PI * r;
  const [val, setVal] = useState(0);
  useEffect(() => { const t = setTimeout(() => setVal(pct), 250); return () => clearTimeout(t); }, [pct]);
  return (
    <div className="donut">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r={r} fill="none" stroke="#EFEFF1" strokeWidth="15" />
        <circle cx="75" cy="75" r={r} fill="none" stroke="#F8D423" strokeWidth="15" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c - (c * val / 100)}
          style={{ transition: "stroke-dashoffset 1.1s cubic-bezier(.2,.7,.2,1)" }} />
      </svg>
      <div className="center">
        <div className="pct">{Math.round(val)}<span style={{fontSize:"16px"}}>%</span></div>
        <div className="lbl">全体達成率</div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [user] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jz_user') || '{}'); } catch { return {}; }
  });

  const [articles,   setArticles]   = useState([]);
  const [logs,       setLogs]       = useState([]);
  const [categories, setCategories] = useState([]);
  const [bookmarks,  setBookmarks]  = useState([]);
  const [pdfLogs,    setPdfLogs]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [animBars,   setAnimBars]   = useState(false);

  /* ── 認証チェック & データ取得 ── */
  useEffect(() => {
    const token = localStorage.getItem('jz_token');
    if (!token) { window.location.href = 'login.html'; return; }

    (async () => {
      try {
        const [aData, lData, cData, bData, pData] = await Promise.all([
          gasPost({ action: 'getArticles',        token }),
          gasPost({ action: 'getReadingLogs',     token }),
          gasPost({ action: 'getCategories',      token }),
          gasPost({ action: 'getBookmarks',       token }),
          gasPost({ action: 'getPdfDownloadLogs', token }),
        ]);

        if (aData.success === false && /認証|token|auth/i.test(aData.error || '')) {
          localStorage.removeItem('jz_token');
          localStorage.removeItem('jz_user');
          window.location.href = 'login.html';
          return;
        }

        if (aData.success) setArticles(aData.articles   || []);
        if (lData.success) setLogs(lData.logs           || []);
        if (cData.success) setCategories(cData.categories || []);
        if (bData.success) setBookmarks(bData.bookmarks  || []);
        if (pData.success) setPdfLogs(pData.logs         || pData.pdfs || []);

      } catch (e) {
        console.error('fetch error', e);
      } finally {
        setLoading(false);
        setTimeout(() => setAnimBars(true), 300);
      }
    })();
  }, []);

  /* ── ログアウト ── */
  async function handleLogout() {
    const token = localStorage.getItem('jz_token');
    try { await gasPost({ action: 'logout', token }); } catch {}
    localStorage.removeItem('jz_token');
    localStorage.removeItem('jz_user');
    window.location.href = 'login.html';
  }

  /* ── 派生データ ── */
  const artById = useMemo(() => {
    const m = {};
    articles.forEach(a => { m[String(a.id)] = a; });
    return m;
  }, [articles]);

  const catById = useMemo(() => {
    const m = {};
    categories.forEach(c => { m[String(c.id)] = c; });
    return m;
  }, [categories]);

  const readSet = useMemo(() => new Set(logs.map(l => String(l.article_id))), [logs]);

  /* カテゴリ進捗 */
  const catProgress = useMemo(() =>
    categories.map((cat, i) => {
      const catArts = articles.filter(a => String(a.category_id || a.category) === String(cat.id));
      const done    = catArts.filter(a => readSet.has(String(a.id))).length;
      return { id: cat.id, name: cat.name, done, total: catArts.length, colorIdx: i % 8 };
    }).filter(c => c.total > 0),
  [categories, articles, readSet]);

  const totalDone = catProgress.reduce((s, c) => s + c.done, 0);
  const totalAll  = catProgress.reduce((s, c) => s + c.total, 0);
  const overall   = totalAll > 0 ? Math.round(totalDone / totalAll * 100) : 0;

  /* 閲覧履歴 (直近10件) */
  const history = useMemo(() => {
    return [...logs]
      .sort((a, b) => new Date(b.created_at || b.date || 0) - new Date(a.created_at || a.date || 0))
      .slice(0, 10)
      .map(log => {
        const art = artById[String(log.article_id)];
        const cat = art ? catById[String(art.category_id || art.category)] : null;
        return {
          articleId: log.article_id,
          title:  art?.title || '（記事タイトル取得中）',
          catName: cat?.name || '',
          catIdx: cat ? (categories.indexOf(cat) % 8) : 0,
          time:   fmtTime(log.created_at || log.date),
          read:   true,
        };
      });
  }, [logs, artById, catById, categories]);

  /* 保存済み記事 */
  const saved = useMemo(() =>
    bookmarks.map(b => {
      const art = artById[String(b.article_id)];
      const cat = art ? catById[String(art.category_id || art.category)] : null;
      return {
        articleId: b.article_id,
        title:   art?.title || '（タイトル取得中）',
        catName: cat?.name || '',
        catIdx:  cat ? (categories.indexOf(cat) % 8) : 0,
      };
    }),
  [bookmarks, artById, catById, categories]);

  /* ユーザー情報 */
  const displayName = user.name || 'ユーザー';
  const avatarChar  = displayName.charAt(0);
  const uid = user.id ? `JZ-${String(user.id).padStart(4, '0')}` : '---';
  const isPhone = /^\d{9,11}$/.test(String(user.identifier || ''));
  const nextRenewal = user.next_renewal ? fmtDate(user.next_renewal) : '---';

  /* PDF 再ダウンロード */
  async function handleReDl(pdfLog) {
    const token = localStorage.getItem('jz_token');
    const pdfId = pdfLog.pdf_id || pdfLog.id;
    try {
      const res = await gasPost({ action: 'downloadPdf', token, pdfId });
      if (res.success && res.url) { window.open(res.url, '_blank'); }
      else if (pdfLog.url || pdfLog.file_url) { window.open(pdfLog.url || pdfLog.file_url, '_blank'); }
    } catch {
      if (pdfLog.url || pdfLog.file_url) window.open(pdfLog.url || pdfLog.file_url, '_blank');
    }
  }

  return (
    <React.Fragment>
      {/* ── ナビゲーション ── */}
      <nav className="nav">
        <div className="brand">
          <div className="brand-mark"><span>ジ</span></div>
          <div className="brand-name">ジブンゼミ</div>
        </div>
        <div className="nav-right">
          <a className="nav-link" href="home.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span className="txt">ホーム</span>
          </a>
          <a className="nav-link" href="articles.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span className="txt">記事一覧</span>
          </a>
          <a className="nav-link active" href="mypage.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span className="txt">マイページ</span>
          </a>
          <button className="nav-link" style={{color:'rgba(255,255,255,0.7)'}} onClick={handleLogout}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span className="txt">ログアウト</span>
          </button>
          <div className="nav-avatar">{avatarChar}</div>
        </div>
      </nav>

      <div className="wrap">
        <div className="page-head">
          <h1>マイページ</h1>
          <p>あなたの学習状況と保存したコンテンツを管理できます。</p>
        </div>

        {/* ── Top: profile + progress ── */}
        <div className="top-grid">
          {/* プロフィール */}
          <div className="card profile">
            <div className="avatar">{avatarChar}</div>
            <div className="name">{displayName}</div>
            <div className="uid">会員ID：{uid}</div>
            <div className="info-rows">
              <div className="info-row">
                <span className="k">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.34a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.74-1.27a2 2 0 0 1 2.11-.45c.74.34 1.53.57 2.34.7A2 2 0 0 1 22 16.92z"/></svg>
                  登録方式
                </span>
                <span className="method-pill">
                  {isPhone
                    ? <React.Fragment><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="2" width="12" height="20" rx="2.5"/><line x1="10" y1="18" x2="14" y2="18"/></svg>電話番号</React.Fragment>
                    : <React.Fragment><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/></svg>note ID</React.Fragment>
                  }
                </span>
              </div>
              <div className="info-row">
                <span className="k">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
                  サブスク状態
                </span>
                <span className="sub-badge"><span className="pulse"></span>有効</span>
              </div>
              <div className="info-row">
                <span className="k">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  次回更新
                </span>
                <span className="v">{nextRenewal}</span>
              </div>
              <div className="info-row">
                <span className="k">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                  プラン
                </span>
                <span className="v">月額 500円</span>
              </div>
            </div>
            <a className="btn-settings" href="account_settings.html">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              アカウント設定
            </a>
          </div>

          {/* 学習進捗 */}
          <div className="card progress">
            <div className="progress-head"><h2><span className="tick"></span>学習進捗</h2></div>
            {loading ? (
              <div className="skeleton sk-block" style={{height: 200}}></div>
            ) : (
              <div className="progress-body">
                <div className="donut-wrap">
                  <Donut pct={overall} />
                  <div className="donut-cap">全 <b>{totalAll}</b> 記事中 <b>{totalDone}</b> 読了</div>
                </div>
                <div className="bars">
                  {catProgress.length === 0 ? (
                    <p style={{fontSize:'13px', color:'var(--muted)'}}>カテゴリ情報を取得中…</p>
                  ) : catProgress.map(c => {
                    const pct = c.total > 0 ? Math.round(c.done / c.total * 100) : 0;
                    return (
                      <div className="bar-item" key={c.id}>
                        <div className="bar-top">
                          <span className="bar-name">{c.name}</span>
                          <span className="bar-val"><b>{pct}%</b>　{c.done}/{c.total}</span>
                        </div>
                        <div className="bar-track">
                          <div className="bar-fill"
                            style={{ width: (animBars ? pct : 0) + "%", background: BAR_COLORS[c.colorIdx] }}>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ── 閲覧履歴 ── */}
        <div className="section">
          <div className="sec-head">
            <h2><span className="tick"></span>閲覧履歴<span className="cnt">直近10件</span></h2>
            <a className="sec-more" href="articles.html">すべて見る</a>
          </div>
          {loading ? (
            <div className="skeleton sk-block" style={{height:280}}></div>
          ) : history.length === 0 ? (
            <div className="empty-msg">まだ閲覧履歴がありません。記事を読み始めましょう！</div>
          ) : (
            <div className="hist-list">
              {history.map((h, i) => (
                <a className="hist-row" key={i} href={`article_detail.html?id=${h.articleId}`}>
                  <div className="hist-thumb"><Stripes seed={i + 100} /></div>
                  <div className="hist-body">
                    <div>
                      {h.catName && <span className={"h-cat cc-" + h.catIdx}>{h.catName}</span>}
                      <h3>{h.title}</h3>
                    </div>
                    <div className="h-meta">
                      <span className={"read-dot " + (h.read ? "done" : "unread")}></span>
                      <span>{h.read ? "読了済み" : "未読"}</span>
                      <span>・</span>
                      <span>{h.time}</span>
                    </div>
                  </div>
                  <span className="hist-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
              ))}
            </div>
          )}
        </div>

        {/* ── 保存済み + PDFログ ── */}
        <div className="bottom-grid">
          {/* 保存済み記事 */}
          <div className="section" style={{marginBottom:0}}>
            <div className="sec-head">
              <h2><span className="tick"></span>保存済み記事<span className="cnt">{loading ? '…' : saved.length}</span></h2>
            </div>
            {loading ? (
              <div className="skeleton sk-block" style={{height:180}}></div>
            ) : saved.length === 0 ? (
              <div className="empty-msg">保存した記事がありません。</div>
            ) : (
              <div className="saved-list">
                {saved.map((s, i) => (
                  <a className="saved-card" key={i} href={`article_detail.html?id=${s.articleId}`}>
                    <div className="saved-thumb"><Stripes seed={i + 200} /></div>
                    <div className="saved-body">
                      {s.catName && <span className={"s-cat cc-" + s.catIdx}>{s.catName}</span>}
                      <h3>{s.title}</h3>
                    </div>
                    <span className="bookmark">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </span>
                  </a>
                ))}
              </div>
            )}
          </div>

          {/* PDFダウンロード履歴 */}
          <div className="section" style={{marginBottom:0}}>
            <div className="sec-head">
              <h2><span className="tick"></span>PDFダウンロード履歴<span className="cnt">{loading ? '…' : pdfLogs.length}</span></h2>
            </div>
            {loading ? (
              <div className="skeleton sk-block" style={{height:180}}></div>
            ) : pdfLogs.length === 0 ? (
              <div className="empty-msg">PDFのダウンロード履歴がありません。</div>
            ) : (
              <div className="pdf-list">
                {pdfLogs.map((p, i) => (
                  <div className="pdf-row" key={i}>
                    <div className="pdf-ic">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                      <span className="ext">PDF</span>
                    </div>
                    <div className="pdf-info">
                      <h3>{p.pdf_title || p.title || p.name || 'ワークシート'}</h3>
                      <div className="p-meta">
                        {p.created_at ? fmtDate(p.created_at) + ' 取得' : ''}
                        {p.file_size ? '・' + p.file_size : ''}
                      </div>
                    </div>
                    <button className="btn-redl" onClick={() => handleReDl(p)}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      再DL
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="foot">© 2026 ジブンゼミ　月額500円のキャリア支援サブスク</div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
