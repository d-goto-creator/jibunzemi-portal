<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ジブンゼミ｜記事詳細</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F5; --accent: #F8D423; --accent-press: #E8C40F;
    --navy: #1A3A6B; --ink: #1F1F1F; --white: #FFFFFF;
    --muted: #6B6B70; --line: #E4E4E7; --field: #FAFAFA;
    --radius: 12px; --shadow: 0 4px 16px rgba(0,0,0,0.12); --ok: #1F8A5B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100%; }
  a { color: inherit; }
  .nav { height: 60px; background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 30; }
  .nav .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  .brand-mark span { font-weight: 900; font-size: 16px; color: var(--navy); line-height: 1; }
  .nav .brand-name { color: var(--white); font-weight: 700; font-size: 17px; letter-spacing: 0.04em; }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .nav-link { color: rgba(255,255,255,0.82); font-size: 13px; font-weight: 700; text-decoration: none; padding: 8px 13px; border-radius: 8px; display: flex; align-items: center; gap: 7px; transition: color 0.15s, background 0.15s; cursor: pointer; background: none; border: none; font-family: inherit; }
  .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.10); }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--navy); display: grid; place-items: center; font-weight: 900; font-size: 13px; margin-left: 4px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 22px 24px 64px; }
  .crumb { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); margin-bottom: 22px; flex-wrap: wrap; }
  .crumb a { text-decoration: none; font-weight: 500; transition: color 0.15s; }
  .crumb a:hover { color: var(--ink); }
  .crumb .sep { color: var(--line); }
  .crumb .current { color: var(--ink); font-weight: 700; }
  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
  .main-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .thumb { background: var(--field); position: relative; overflow: hidden; display: grid; place-items: center; min-height: 280px; }
  .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .thumb .ph-stripes { position: absolute; inset: 0; opacity: 0.5; }
  .thumb .ph-label { position: relative; font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.85); padding: 5px 10px; border-radius: 6px; }
  .article-head { padding: 26px 30px 30px; }
  .tagrow { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .cat-tag { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 6px; }
  .date { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  h1.title { font-size: 27px; font-weight: 900; line-height: 1.45; letter-spacing: 0.01em; margin-bottom: 18px; }
  .lead { font-size: 14.5px; line-height: 1.95; color: #3a3a40; padding: 18px 20px; background: var(--field); border-radius: 10px; border-left: 4px solid var(--accent); }
  /* ── meta-strip: アイコンと文字の縦揃えを修正 ── */
  .meta-strip { display: flex; gap: 22px; padding: 18px 30px; border-top: 1px solid var(--line); }
  .meta-strip .m {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--muted); line-height: 1;
  }
  .meta-strip .m svg { flex-shrink: 0; vertical-align: middle; }
  .meta-strip .m b { color: var(--ink); font-weight: 700; }
  .cc-0 { background: rgba(248,212,35,0.22); color: #8a7000; }
  .cc-1 { background: rgba(26,58,107,0.10);  color: var(--navy); }
  .cc-2 { background: rgba(107,70,193,0.12); color: #5a37b0; }
  .cc-3 { background: rgba(31,138,91,0.12);  color: var(--ok); }
  .cc-4 { background: rgba(176,84,43,0.12);  color: #9c4a25; }
  .cc-5 { background: rgba(220,53,69,0.10);  color: #b02a37; }
  .aside { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 16px; }
  .cta-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 22px; text-align: center; }
  .cta-eyebrow { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .cta-eyebrow b { color: var(--ink); }
  .cta-note-logo { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 18px; font-size: 12.5px; color: var(--muted); }
  .note-chip { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--ink); display: grid; place-items: center; font-weight: 900; font-size: 12px; color: var(--ink); }
  .btn-note { width: 100%; font-family: inherit; font-size: 18px; font-weight: 900; color: var(--ink); background: var(--accent); border: none; border-radius: 12px; padding: 19px; cursor: pointer; letter-spacing: 0.03em; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 18px rgba(248,212,35,0.5); transition: background 0.16s, transform 0.08s, box-shadow 0.16s; text-decoration: none; }
  .btn-note:hover { background: var(--accent-press); transform: translateY(-1px); }
  .btn-note:active { transform: translateY(1px); }
  .cta-sub { margin-top: 13px; font-size: 12.5px; color: var(--muted); font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .cta-sub .heart { color: #e0556b; }
  .cta-divider { height: 1px; background: var(--line); margin: 20px 0 18px; }
  .sub-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-sub { font-family: inherit; font-size: 13.5px; font-weight: 700; color: var(--ink); background: var(--white); border: 1.5px solid var(--line); border-radius: 10px; padding: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.16s; }
  .btn-sub:hover:not(:disabled) { border-color: var(--muted); background: var(--field); }
  .btn-sub:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-sub.done { background: var(--ok); border-color: var(--ok); color: var(--white); }
  .btn-sub.done:hover:not(:disabled) { background: #1a754d; }
  .btn-sub.saved { background: rgba(248,212,35,0.18); border-color: var(--accent); color: #7d6500; }
  .section { margin-top: 30px; }
  .sec-head h2 { font-size: 17px; font-weight: 900; display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .sec-head h2 .tick { width: 5px; height: 18px; background: var(--accent); border-radius: 2px; display: inline-block; }
  .pdf-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; display: flex; align-items: center; gap: 16px; }
  .pdf-card + .pdf-card { margin-top: 12px; }
  .pdf-icon { width: 48px; height: 56px; border-radius: 8px; flex-shrink: 0; background: rgba(192,57,43,0.10); color: #C0392B; display: grid; place-items: center; position: relative; border: 1.5px solid rgba(192,57,43,0.2); }
  .pdf-icon .ext { position: absolute; bottom: 6px; font-size: 8px; font-weight: 900; }
  .pdf-body { flex: 1; }
  .pdf-body h3 { font-size: 14.5px; font-weight: 700; margin-bottom: 4px; }
  .pdf-body p { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .btn-dl { font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink); background: var(--white); border: 1.5px solid var(--line); border-radius: 9px; padding: 11px 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 7px; transition: all 0.16s; }
  .btn-dl:hover { border-color: var(--navy); background: var(--field); color: var(--navy); }
  .rel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card-art { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.12s, box-shadow 0.18s; border: 1.5px solid transparent; text-decoration: none; color: inherit; }
  .card-art:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,0,0,0.14); border-color: rgba(248,212,35,0.6); }
  .card-art .thumb { min-height: 110px; }
  .card-body { padding: 14px 15px 16px; }
  .card-body .cat-tag2 { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; margin-bottom: 9px; }
  .card-body h3 { font-size: 13.5px; font-weight: 700; line-height: 1.5; }
  .skeleton { background: linear-gradient(90deg, var(--line) 25%, #f0f0f2 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .sk-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .sk-thumb { height: 280px; }
  .sk-body { padding: 26px 30px; }
  .sk-line { height: 13px; margin-bottom: 14px; }
  .sk-line.w30{width:30%} .sk-line.w60{width:60%} .sk-line.w90{width:90%} .sk-line.full{width:100%}
  .error-box { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 60px 30px; text-align: center; }
  .error-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .error-box p { font-size: 13.5px; color: var(--muted); margin-bottom: 20px; }
  .btn-back { display: inline-flex; align-items: center; gap: 7px; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink); background: var(--accent); border: none; border-radius: 9px; padding: 11px 20px; cursor: pointer; }
  .foot { margin-top: 36px; font-size: 11px; color: #A0A0A6; text-align: center; }
  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); background: var(--navy); color: var(--white); font-size: 13px; font-weight: 500; padding: 13px 22px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.22); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 50; display: flex; align-items: center; gap: 9px; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .tk { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } .aside { position: static; } .rel-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 620px) { .nav { padding: 0 16px; } .nav-right .nav-link span.txt { display: none; } .nav-link { padding: 8px; } .wrap { padding: 18px 16px 52px; } h1.title { font-size: 22px; } .article-head { padding: 22px 20px 24px; } .meta-strip { padding: 16px 20px; gap: 16px; flex-wrap: wrap; } .thumb { min-height: 200px; } .rel-grid { grid-template-columns: 1fr; } .pdf-card { flex-wrap: wrap; } .btn-dl { width: 100%; justify-content: center; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

async function gasPost(body) {
  const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return resp.json();
}

function getArticleId() {
  return new URLSearchParams(window.location.search).get('id');
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 公開`;
}

/* ── 読了時間を文字数から推定（home.htmlと同じロジック） ── */
function estimateReadTime(article) {
  const text = [article.title || '', article.description || ''].join('');
  return Math.max(1, Math.round((text.length + 1500) / 400));
}

function Stripes({ seed = 0 }) {
  const id = "s" + seed;
  return (
    <svg className="ph-stripes" width="100%" height="100%" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <pattern id={id} width="16" height="16" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
          <rect width="16" height="16" fill="#FAFAFA"/>
          <line x1="0" y1="0" x2="0" y2="16" stroke="#E4E4E7" strokeWidth="8"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill={"url(#"+id+")"}/>
    </svg>
  );
}

function ArticleThumb({ article, style }) {
  const url = article && (article.thumbnail_url || article.thumb_url);
  return (
    <div className="thumb" style={style}>
      {url
        ? <img src={url} alt={article.title || ''} onError={e => { e.target.style.display='none'; }} />
        : <React.Fragment><Stripes seed={article ? article.id : 0} /><span className="ph-label">記事サムネイル</span></React.Fragment>
      }
    </div>
  );
}

function SkeletonMain() {
  return (
    <div className="sk-card">
      <div className="sk-thumb skeleton"></div>
      <div className="sk-body">
        <div className="sk-line w30 skeleton"></div>
        <div className="sk-line w90 skeleton"></div>
        <div className="sk-line w60 skeleton"></div>
        <div className="sk-line full skeleton" style={{height:80,borderRadius:10}}></div>
      </div>
    </div>
  );
}

function App() {
  const articleId = getArticleId();
  const [user] = useState(() => { try { return JSON.parse(localStorage.getItem('jz_user') || '{}'); } catch { return {}; } });

  const [article,      setArticle]      = useState(null);
  const [pdfs,         setPdfs]         = useState([]);
  const [related,      setRelated]      = useState([]);
  const [catName,      setCatName]      = useState('');
  const [catIdx,       setCatIdx]       = useState(0);
  const [loading,      setLoading]      = useState(true);
  const [error,        setError]        = useState('');
  const [done,         setDone]         = useState(false);
  const [saved,        setSaved]        = useState(false);
  const [doneLoading,  setDoneLoading]  = useState(false);
  const [savedLoading, setSavedLoading] = useState(false);
  const [toast,        setToast]        = useState('');
  const toastTimer = useRef(null);

  useEffect(() => {
    const token = localStorage.getItem('jz_token');
    if (!token) { window.location.href = 'login.html'; return; }
    if (!articleId) { window.location.href = 'articles.html'; return; }

    (async () => {
      try {
        const [aData, lData, bData, cData, allData, pData] = await Promise.all([
          gasPost({ action: 'getArticle',     token, id: articleId }),
          gasPost({ action: 'getReadingLogs', token }),
          gasPost({ action: 'getBookmarks',   token }),
          gasPost({ action: 'getCategories',  token }),
          gasPost({ action: 'getArticles',    token }),
          gasPost({ action: 'getPdfs',        token }),
        ]);

        if (aData.success === false && /認証|token|auth/i.test(aData.error || '')) {
          localStorage.removeItem('jz_token'); localStorage.removeItem('jz_user');
          window.location.href = 'login.html'; return;
        }
        if (!aData.success || !aData.article) { setError(aData.error || '記事が見つかりませんでした'); return; }

        const art = aData.article;
        setArticle(art);

        if (cData.success) {
          const cats = cData.categories || [];
          const cat  = cats.find(c => String(c.id) === String(art.category_id || art.category));
          if (cat) { setCatName(cat.name); setCatIdx(cats.indexOf(cat) % 6); }
        }

        if (lData.success) {
          const log = (lData.logs || []).find(l => String(l.article_id) === String(art.id));
          setDone(log ? (log.is_completed === true || log.is_completed === 'TRUE') : false);
        }

        if (bData.success) {
          setSaved((bData.bookmarks || []).some(b => String(b.article_id) === String(art.id)));
        }

        if (allData.success) {
          const rel = (allData.articles || [])
            .filter(a => String(a.id) !== String(art.id) &&
              String(a.category_id || a.category) === String(art.category_id || art.category))
            .slice(0, 3);
          setRelated(rel);
        }

        if (pData.success) {
          const artPdfs = (pData.pdfs || []).filter(p =>
            String(p.article_id) === String(art.id));
          setPdfs(artPdfs);
        }
      } catch (e) {
        console.error('fetch error', e);
        setError('通信エラーが発生しました。ページを再読み込みしてください。');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  async function handleLogout() {
    const token = localStorage.getItem('jz_token');
    try { await gasPost({ action: 'logout', token }); } catch {}
    localStorage.removeItem('jz_token'); localStorage.removeItem('jz_user');
    window.location.href = 'login.html';
  }

  function flash(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2400);
  }

  /* ── 読了トグル（正しいアクション名：markRead） ── */
  async function toggleDone() {
    if (doneLoading) return;
    setDoneLoading(true);
    const token = localStorage.getItem('jz_token');
    const newDone = !done;
    try {
      const res = await gasPost({
        action:      'markRead',
        token,
        article_id:  article.id,
        is_completed: newDone,
      });
      if (res.success) {
        setDone(newDone);
        flash(newDone ? '読了済みにしました' : '未読に戻しました');
      } else {
        flash(res.error || '更新に失敗しました');
      }
    } catch {
      flash('通信エラーが発生しました');
    } finally {
      setDoneLoading(false);
    }
  }

  /* ── ブックマークトグル（正しいアクション名：addBookmark / removeBookmark） ── */
  async function toggleSave() {
    if (savedLoading) return;
    setSavedLoading(true);
    const token = localStorage.getItem('jz_token');
    const newSaved = !saved;
    try {
      const res = await gasPost({
        action:     newSaved ? 'addBookmark' : 'removeBookmark',
        token,
        article_id: article.id,
      });
      if (res.success) {
        setSaved(newSaved);
        flash(newSaved ? 'マイリストに保存しました' : '保存を解除しました');
      } else {
        flash(res.error || '更新に失敗しました');
      }
    } catch {
      flash('通信エラーが発生しました');
    } finally {
      setSavedLoading(false);
    }
  }

  /* ── PDF ダウンロード（正しいアクション名：logPdfDownload） ── */
  async function handlePdfDownload(pdf) {
    const token = localStorage.getItem('jz_token');
    try {
      const res = await gasPost({ action: 'logPdfDownload', token, pdf_id: pdf.id });
      const url = res.drive_url || pdf.drive_url || pdf.url;
      if (url) {
        window.open(url, '_blank');
        flash('ダウンロードを開始しました');
      } else {
        flash('ダウンロードURLが見つかりませんでした');
      }
    } catch {
      flash('通信エラーが発生しました');
    }
  }

  const displayName = (user.name || 'ユーザー').split(/[\s　]/)[0];
  const avatarChar  = displayName.charAt(0);

  return (
    <React.Fragment>
      <nav className="nav">
        <div className="brand">
          <div className="brand-mark"><span>ジ</span></div>
          <div className="brand-name">ジブンゼミ</div>
        </div>
        <div className="nav-right">
          <a className="nav-link" href="home.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span className="txt">ホーム</span></a>
          <a className="nav-link" href="articles.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span className="txt">記事一覧</span></a>
          <a className="nav-link" href="mypage.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span className="txt">マイページ</span></a>
          <button className="nav-link" style={{color:'rgba(255,255,255,0.7)'}} onClick={handleLogout}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span className="txt">ログアウト</span></button>
          <div className="nav-avatar">{avatarChar}</div>
        </div>
      </nav>

      <div className="wrap">
        <div className="crumb">
          <a href="home.html">ホーム</a><span className="sep">/</span>
          <a href="articles.html">記事一覧</a>
          {catName && <React.Fragment><span className="sep">/</span><a href="articles.html">{catName}</a></React.Fragment>}
          {article && <React.Fragment><span className="sep">/</span><span className="current">{article.title}</span></React.Fragment>}
        </div>

        {!loading && error && (
          <div className="error-box">
            <h2>記事を表示できませんでした</h2>
            <p>{error}</p>
            <button className="btn-back" onClick={() => window.location.href='articles.html'}>記事一覧に戻る</button>
          </div>
        )}

        {loading && (
          <div className="layout">
            <SkeletonMain />
            <div className="aside"><div className="sk-card" style={{height:260}}><div style={{height:'100%'}} className="skeleton"></div></div></div>
          </div>
        )}

        {!loading && !error && article && (
          <div className="layout">
            <div>
              <article className="main-card">
                <ArticleThumb article={article} />
                <div className="article-head">
                  <div className="tagrow">
                    {catName && <span className={"cat-tag cc-"+catIdx}>{catName}</span>}
                    <span className="date">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      {fmtDate(article.created_at)}
                    </span>
                  </div>
                  <h1 className="title">{article.title}</h1>
                  {article.description && <p className="lead">{article.description}</p>}
                </div>
                {/* ── meta-strip: アイコンと文字の縦揃えを修正済み ── */}
                <div className="meta-strip">
                  <div className="m">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--navy)'}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    約 <b>{estimateReadTime(article)}分</b> で読める
                  </div>
                  <div className="m">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--navy)'}}><path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    note公開記事
                  </div>
                </div>
              </article>

              {pdfs.length > 0 && (
                <div className="section">
                  <div className="sec-head"><h2><span className="tick"></span>関連ワークシート</h2></div>
                  {pdfs.map((pdf, i) => (
                    <div className="pdf-card" key={pdf.id || i}>
                      <div className="pdf-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span className="ext">PDF</span>
                      </div>
                      <div className="pdf-body">
                        <h3>{pdf.name || 'ワークシート'}</h3>
                        {pdf.description && <p>{pdf.description}</p>}
                      </div>
                      <button className="btn-dl" onClick={() => handlePdfDownload(pdf)}>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        ダウンロード
                      </button>
                    </div>
                  ))}
                </div>
              )}

              {related.length > 0 && (
                <div className="section">
                  <div className="sec-head"><h2><span className="tick"></span>関連記事</h2></div>
                  <div className="rel-grid">
                    {related.map(r => (
                      <a className="card-art" key={r.id} href={`article_detail.html?id=${r.id}`}>
                        <ArticleThumb article={r} style={{minHeight:110}} />
                        <div className="card-body">
                          {catName && <span className={"cat-tag2 cc-"+catIdx}>{catName}</span>}
                          <h3>{r.title}</h3>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <aside className="aside">
              <div className="cta-card">
                <div className="cta-eyebrow">この記事の本文は <b>note</b> で公開中</div>
                <div className="cta-note-logo"><span className="note-chip">n</span>noteで続きを読む</div>
                {article.note_url ? (
                  <a className="btn-note"
                    href={article.note_url.startsWith('http') ? article.note_url : 'https://'+article.note_url}
                    target="_blank" rel="noopener noreferrer">
                    noteで読む
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
                  </a>
                ) : (
                  <button className="btn-note" disabled style={{opacity:0.5,cursor:'default'}}>URLを設定中</button>
                )}
                <div className="cta-sub">
                  <span className="heart"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
                  いいねもぜひお願いします！
                </div>
                <div className="cta-divider"></div>
                <div className="sub-actions">
                  <button className={"btn-sub"+(done?" done":"")} onClick={toggleDone} disabled={doneLoading}>
                    <span style={{display:'grid',placeItems:'center'}}>
                      {done
                        ? <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        : <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 16 9.5"/></svg>}
                    </span>
                    {doneLoading ? '更新中...' : done ? '読了済み' : '読了済みにする'}
                  </button>
                  <button className={"btn-sub"+(saved?" saved":"")} onClick={toggleSave} disabled={savedLoading}>
                    <span style={{display:'grid',placeItems:'center'}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill={saved?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </span>
                    {savedLoading ? '更新中...' : saved ? '保存済み' : '保存する'}
                  </button>
                </div>
              </div>
            </aside>
          </div>
        )}

        <div className="foot">© 2026 ジブンゼミ　月額500円のキャリア支援サブスク</div>
      </div>

      <div className={"toast"+(toast?" show":"")}>
        <span className="tk"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        {toast}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
