<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン｜ジブンゼミ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:   #4F46E5;
      --primary-h: #4338CA;
      --accent:    #06B6D4;
      --surface:   #F8FAFC;
      --card:      #FFFFFF;
      --border:    #E2E8F0;
      --text:      #1E293B;
      --muted:     #64748B;
      --error:     #EF4444;
      --success:   #10B981;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(79,70,229,.10);
    }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(135deg, #EEF2FF 0%, #F0FDFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 40px 36px 36px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    /* ── Logo / Header ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
    .logo-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .logo-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: #fff;
    }
    .input-wrap input.has-err { border-color: var(--error); }
    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      padding: 2px;
    }
    .pw-toggle:hover { color: var(--text); }
    .err-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 4px;
    }

    /* ── API Error banner ── */
    .api-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .api-error svg { flex-shrink: 0; }

    /* ── Submit button ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary), #6366F1);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer links ── */
    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-link a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(16,185,129,.3);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef } = React;

  /* ── GAS API エンドポイント ── */
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

  /* ── バリデーション ── */
  function validate(vals, tab) {
    const e = {};
    if (tab === 'phone') {
      if (!vals.phone.trim()) e.phone = '電話番号を入力してください';
      else if (!/^[0-9\-]+$/.test(vals.phone.trim())) e.phone = '半角数字とハイフンで入力してください';
    } else {
      if (!vals.note.trim()) e.note = 'note ユーザーIDを入力してください';
    }
    if (!vals.pw) e.pw = 'パスワードを入力してください';
    else if (vals.pw.length < 6) e.pw = '6文字以上で入力してください';
    return e;
  }

  /* ── Eye / EyeOff icons ── */
  const EyeIcon = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  );
  const EyeOffIcon = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  );

  /* ── App ── */
  function App() {
    const [tab, setTab]         = useState('phone');
    const [vals, setVals]       = useState({ phone: '', note: '', pw: '' });
    const [errors, setErrors]   = useState({});
    const [touched, setTouched] = useState(false);
    const [showPw, setShowPw]   = useState(false);
    const [loading, setLoading] = useState(false);
    const [toast, setToast]     = useState(false);
    const [apiError, setApiError] = useState('');
    const toastTimer = useRef(null);

    function set(k) { return v => setVals(prev => ({ ...prev, [k]: v })); }

    function switchTab(t) {
      setTab(t);
      setErrors({});
      setApiError('');
      setTouched(false);
    }

    async function submit(ev) {
      ev.preventDefault();
      setTouched(true);
      setApiError('');
      const e = validate(vals, tab);
      setErrors(e);
      if (Object.keys(e).length > 0) return;

      setLoading(true);
      try {
        /* 電話番号からハイフン・スペース除去して送信 */
        const identifier = tab === 'phone'
          ? vals.phone.replace(/[-\s]/g, '')
          : vals.note.trim();

        const resp = await fetch(GAS_URL, {
          method: 'POST',
          /* Content-Type を設定しない → text/plain として送信 → CORSプリフライト不要 */
          body: JSON.stringify({ action: 'login', identifier, password: vals.pw })
        });

        const data = await resp.json();

        if (data.success) {
          /* トークンとユーザー情報を保存 */
          localStorage.setItem('jz_token', data.token);
          localStorage.setItem('jz_user', JSON.stringify(data.user));

          /* 成功トースト表示後 → home.html へ遷移 */
          setToast(true);
          clearTimeout(toastTimer.current);
          toastTimer.current = setTimeout(() => {
            window.location.href = 'home.html';
          }, 900);
        } else {
          setApiError(data.error || 'ログインに失敗しました');
        }
      } catch (err) {
        setApiError('通信エラーが発生しました。しばらく待ってから再試行してください。');
      } finally {
        setLoading(false);
      }
    }

    return (
      <div className="card">
        {/* ── Logo ── */}
        <div className="logo-wrap">
          <div className="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div className="logo-title">ジブンゼミ</div>
          <div className="logo-sub">サブスクリプションポータル</div>
        </div>

        {/* ── Tabs ── */}
        <div className="tabs">
          <button className={`tab-btn ${tab === 'phone' ? 'active' : ''}`}
                  onClick={() => switchTab('phone')}>
            📱 電話番号
          </button>
          <button className={`tab-btn ${tab === 'note' ? 'active' : ''}`}
                  onClick={() => switchTab('note')}>
            📝 note ID
          </button>
        </div>

        {/* ── API エラー表示 ── */}
        {apiError && (
          <div className="api-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {apiError}
          </div>
        )}

        {/* ── Form ── */}
        <form onSubmit={submit} noValidate>
          {tab === 'phone' ? (
            <div className="field">
              <label className="label">電話番号</label>
              <div className="input-wrap">
                <input
                  type="tel"
                  placeholder="090-1234-5678"
                  value={vals.phone}
                  onChange={ev => set('phone')(ev.target.value)}
                  className={touched && errors.phone ? 'has-err' : ''}
                />
              </div>
              {touched && errors.phone && <div className="err-msg">{errors.phone}</div>}
            </div>
          ) : (
            <div className="field">
              <label className="label">note ユーザーID</label>
              <div className="input-wrap">
                <input
                  type="text"
                  placeholder="your_note_id"
                  value={vals.note}
                  onChange={ev => set('note')(ev.target.value)}
                  className={touched && errors.note ? 'has-err' : ''}
                />
              </div>
              {touched && errors.note && <div className="err-msg">{errors.note}</div>}
            </div>
          )}

          <div className="field">
            <label className="label">パスワード</label>
            <div className="input-wrap">
              <input
                type={showPw ? 'text' : 'password'}
                placeholder="6文字以上"
                value={vals.pw}
                onChange={ev => set('pw')(ev.target.value)}
                style={{ paddingRight: '40px' }}
                className={touched && errors.pw ? 'has-err' : ''}
              />
              <button type="button" className="pw-toggle" onClick={() => setShowPw(p => !p)}>
                {showPw ? <EyeOffIcon /> : <EyeIcon />}
              </button>
            </div>
            {touched && errors.pw && <div className="err-msg">{errors.pw}</div>}
          </div>

          <button type="submit" className="btn-primary" disabled={loading}>
            {loading
              ? <><div className="spinner" /> ログイン中...</>
              : 'ログイン'}
          </button>
        </form>

        {/* ── Footer links ── */}
        <div className="footer-link">
          アカウントをお持ちでない方は
          <a href="register.html">新規登録はこちら →</a>
        </div>
        <div className="footer-link" style={{ marginTop: '8px' }}>
          <a href="javascript:void(0)" style={{ color: 'var(--muted)', fontSize: '12px' }}>
            パスワードをお忘れの方
          </a>
        </div>

        {/* ── Toast ── */}
        <div className={`toast ${toast ? 'show' : ''}`}>
          ✅ ログインしました。ホームに移動します...
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
