<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ログイン｜ジブンゼミ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#F4F4F5;--accent:#F8D423;--accent-press:#E8C40F;
    --navy:#1A3A6B;--ink:#1F1F1F;--white:#FFFFFF;
    --muted:#6B6B70;--line:#E4E4E7;--field:#FAFAFA;
    --radius:12px;--shadow:0 4px 24px rgba(26,58,107,0.14);
    --ok:#1F8A5B;--danger:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Noto Sans JP",sans-serif;
    background:var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }

  /* ── Card ── */
  .card{
    background:var(--white);border-radius:20px;box-shadow:var(--shadow);
    width:100%;max-width:420px;overflow:hidden;position:relative;
  }
  /* トップバー（ネイビー） */
  .card-top{
    background:var(--navy);padding:36px 36px 32px;text-align:center;
  }

  /* ── 電球アイコン ── */
  .logo-icon{
    width:68px;height:68px;border-radius:50%;
    background:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:14px;
    box-shadow:0 6px 20px rgba(248,212,35,0.45);
  }

  .logo-title{font-size:22px;font-weight:900;color:var(--white);letter-spacing:0.03em}
  .logo-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;font-weight:700;letter-spacing:0.06em}

  /* ── Tabs ── */
  .tabs{
    display:flex;background:rgba(255,255,255,0.12);
    border-radius:10px;padding:4px;margin:20px 0 0;gap:4px;
  }
  .tab-btn{
    flex:1;padding:9px 0;border:none;background:transparent;border-radius:8px;
    font-family:inherit;font-size:13px;font-weight:700;
    color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.18s;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .tab-btn:hover{color:var(--white)}
  .tab-btn.active{background:var(--accent);color:var(--ink)}

  /* ── Form body ── */
  .card-body{padding:28px 32px 32px}

  /* ── API エラーバナー ── */
  .api-error{
    background:rgba(192,57,43,0.07);border:1.5px solid rgba(192,57,43,0.22);
    border-radius:10px;padding:11px 14px;font-size:13px;color:var(--danger);
    margin-bottom:18px;display:flex;align-items:center;gap:8px;line-height:1.5;
  }
  .api-error svg{flex-shrink:0}

  /* ── Fields ── */
  .field{margin-bottom:16px}
  .field:last-of-type{margin-bottom:0}
  .label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:7px}
  .input-wrap{position:relative}
  .input-wrap input{
    width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);
    background:var(--field);border:1.5px solid var(--line);border-radius:10px;
    padding:12px 14px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;
  }
  .input-wrap input:focus{
    border-color:var(--accent);box-shadow:0 0 0 3px rgba(248,212,35,0.25);background:var(--white);
  }
  .input-wrap input.has-err{border-color:var(--danger);background:#FDF3F2}
  .pw-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--muted);
    display:flex;align-items:center;padding:2px;transition:color 0.15s;
  }
  .pw-toggle:hover{color:var(--ink)}
  .err-msg{font-size:11.5px;color:var(--danger);margin-top:5px;font-weight:500;display:flex;align-items:center;gap:4px}

  /* ── ログインボタン ── */
  .btn-primary{
    width:100%;font-family:inherit;font-size:15px;font-weight:900;
    color:var(--ink);background:var(--accent);border:none;border-radius:11px;
    padding:14px;cursor:pointer;margin-top:20px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 4px 14px rgba(248,212,35,0.5);
    transition:background 0.15s,transform 0.08s,box-shadow 0.15s;
  }
  .btn-primary:hover:not(:disabled){background:var(--accent-press);transform:translateY(-1px);box-shadow:0 6px 18px rgba(248,212,35,0.55)}
  .btn-primary:active:not(:disabled){transform:translateY(1px)}
  .btn-primary:disabled{background:#eee;color:#aaa;cursor:not-allowed;box-shadow:none}

  /* ── スピナー ── */
  .spinner{width:17px;height:17px;border:2.5px solid rgba(31,31,31,0.18);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── フッターリンク ── */
  .footer-links{margin-top:20px;text-align:center;display:flex;flex-direction:column;gap:8px}
  .footer-links p{font-size:12.5px;color:var(--muted)}
  .footer-links a{color:var(--navy);text-decoration:none;font-weight:700}
  .footer-links a:hover{text-decoration:underline}
  .footer-links .forget{font-size:12px;color:var(--muted)}
  .footer-links .forget a{color:var(--muted);font-weight:500}

  /* ── トースト ── */
  .toast{
    position:fixed;bottom:28px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:var(--white);
    font-size:13px;font-weight:500;padding:13px 22px;border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.22);opacity:0;pointer-events:none;
    transition:opacity 0.3s,transform 0.3s;z-index:60;
    display:flex;align-items:center;gap:9px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .tk{width:18px;height:18px;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex-shrink:0}

  @media(max-width:480px){
    .card-top{padding:28px 24px 24px}
    .card-body{padding:22px 24px 28px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef } = React;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyk7ehj7Whvk6blfLjCMkFSi_XpAhpWXO473JTlQEoDhwd2gb574dCV9lxG6owkF_iTFw/exec';

function validate(vals, tab) {
  const e = {};
  if (tab === 'phone') {
    if (!vals.phone.trim()) e.phone = '電話番号を入力してください';
    else if (!/^[0-9\-]+$/.test(vals.phone.trim())) e.phone = '半角数字とハイフンで入力してください';
  } else {
    if (!vals.note.trim()) e.note = 'note ユーザーIDを入力してください';
  }
  if (!vals.pw) e.pw = 'パスワードを入力してください';
  else if (vals.pw.length < 6) e.pw = '6文字以上で入力してください';
  return e;
}

/* ── 電球アイコン SVG ── */
function BulbIcon() {
  return (
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {/* 電球本体 */}
      <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.22-1.2 4.16-3 5.2V17a1 1 0 0 1-1 1H10a1 1 0 0 1-1-1v-2.8C7.2 13.16 6 11.22 6 9a6 6 0 0 1 6-6z" fill="rgba(26,58,107,0.12)"/>
      <path d="M9 21h6"/>
      <path d="M12 3a6 6 0 0 1 6 6c0 2.22-1.2 4.16-3 5.2V17a1 1 0 0 1-1 1H10a1 1 0 0 1-1-1v-2.8C7.2 13.16 6 11.22 6 9a6 6 0 0 1 6-6z"/>
      {/* フィラメント */}
      <line x1="10" y1="14" x2="14" y2="14"/>
    </svg>
  );
}

function EyeIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  );
}
function EyeOffIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  );
}

function App() {
  const [tab,      setTab]      = useState('phone');
  const [vals,     setVals]     = useState({ phone:'', note:'', pw:'' });
  const [errors,   setErrors]   = useState({});
  const [touched,  setTouched]  = useState(false);
  const [showPw,   setShowPw]   = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [toast,    setToast]    = useState(false);
  const [apiError, setApiError] = useState('');
  const toastTimer = useRef(null);

  function set(k){ return v => setVals(p => ({...p, [k]: v})) }

  function switchTab(t){
    setTab(t); setErrors({}); setApiError(''); setTouched(false);
  }

  async function submit(ev) {
    ev.preventDefault();
    setTouched(true); setApiError('');
    const e = validate(vals, tab);
    setErrors(e);
    if (Object.keys(e).length > 0) return;
    setLoading(true);
    try {
      const identifier = tab === 'phone'
        ? vals.phone.replace(/[-\s]/g, '')
        : vals.note.trim();
      const resp = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', identifier, password: vals.pw })
      });
      const data = await resp.json();
      if (data.success) {
        localStorage.setItem('jz_token', data.token);
        localStorage.setItem('jz_user', JSON.stringify(data.user));
        setToast(true);
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => { window.location.href = 'home.html'; }, 900);
      } else {
        setApiError(data.error || 'ログインに失敗しました');
      }
    } catch {
      setApiError('通信エラーが発生しました。しばらく待ってから再試行してください。');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card">
      {/* ── ネイビーヘッダー ── */}
      <div className="card-top">
        <div className="logo-icon"><BulbIcon /></div>
        <div className="logo-title">ジブンゼミ</div>
        <div className="logo-sub">SUBSCRIPTION PORTAL</div>

        {/* タブ */}
        <div className="tabs">
          <button className={"tab-btn"+(tab==='phone'?' active':'')} onClick={()=>switchTab('phone')}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="2" width="12" height="20" rx="2.5"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
            電話番号
          </button>
          <button className={"tab-btn"+(tab==='note'?' active':'')} onClick={()=>switchTab('note')}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/></svg>
            note ID
          </button>
        </div>
      </div>

      {/* ── フォームエリア ── */}
      <div className="card-body">
        {apiError && (
          <div className="api-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {apiError}
          </div>
        )}

        <form onSubmit={submit} noValidate>
          {tab === 'phone' ? (
            <div className="field">
              <label className="label">電話番号</label>
              <div className="input-wrap">
                <input type="tel" placeholder="090-1234-5678"
                  value={vals.phone} onChange={ev=>set('phone')(ev.target.value)}
                  className={touched&&errors.phone?'has-err':''} />
              </div>
              {touched&&errors.phone&&<div className="err-msg">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {errors.phone}</div>}
            </div>
          ) : (
            <div className="field">
              <label className="label">note ユーザーID</label>
              <div className="input-wrap">
                <input type="text" placeholder="your_note_id"
                  value={vals.note} onChange={ev=>set('note')(ev.target.value)}
                  className={touched&&errors.note?'has-err':''} />
              </div>
              {touched&&errors.note&&<div className="err-msg">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {errors.note}</div>}
            </div>
          )}

          <div className="field">
            <label className="label">パスワード</label>
            <div className="input-wrap">
              <input type={showPw?'text':'password'} placeholder="6文字以上"
                value={vals.pw} onChange={ev=>set('pw')(ev.target.value)}
                style={{paddingRight:'42px'}}
                className={touched&&errors.pw?'has-err':''} />
              <button type="button" className="pw-toggle" onClick={()=>setShowPw(p=>!p)}>
                {showPw?<EyeOffIcon/>:<EyeIcon/>}
              </button>
            </div>
            {touched&&errors.pw&&<div className="err-msg">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              {errors.pw}</div>}
          </div>

          <button type="submit" className="btn-primary" disabled={loading}>
            {loading
              ? <React.Fragment><div className="spinner"></div>ログイン中...</React.Fragment>
              : 'ログイン'}
          </button>
        </form>

        <div className="footer-links">
          <p>アカウントをお持ちでない方は <a href="register.html">新規登録はこちら →</a></p>
          <p className="forget"><a href="javascript:void(0)">パスワードをお忘れの方</a></p>
        </div>
      </div>

      {/* ── トースト ── */}
      <div className={"toast"+(toast?' show':'')}>
        <span className="tk">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1A3A6B" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        ログインしました。ホームに移動します...
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
